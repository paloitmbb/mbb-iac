name: 'Security - Scan Trivy'
description: 'Run Security - Scan Trivy with SARIF upload'

inputs:
  enabled:
    description: 'Enable Trivy scanning (true/false)'
    required: true

  working-directory:
    description: 'Working directory containing Terraform code'
    required: true

  severity:
    description: 'Minimum severity to fail (CRITICAL, HIGH, MEDIUM, LOW)'
    required: true

  environment:
    description: 'Target environment for SARIF category naming'
    required: true

  continue-on-error:
    description: 'Continue workflow if scan step fails (recommended: true for visibility)'
    required: false
    default: 'true'

outputs:
  outcome:
    description: 'Scan outcome (success/failure/skipped)'
    value: ${{ steps.result.outputs.outcome }}

runs:
  using: 'composite'
  steps:
    - name: Run Security - Scan Trivy
      id: scan
      if: inputs.enabled == 'true'
      continue-on-error: true  # Always continue to allow proper outcome handling
      uses: aquasecurity/trivy-action@22438a435773de8c97dc0958cc0b823c45b064ac  # v0.33.1
      with:
        scan-type: 'config'
        scan-ref: ${{ inputs.working-directory }}
        format: 'sarif'
        output: 'trivy-results.sarif'
        severity: ${{ inputs.severity }}

    - name: Ensure SARIF file exists
      id: ensure-sarif
      if: inputs.enabled == 'true' && always()
      shell: bash
      run: |
        if [ ! -f "trivy-results.sarif" ]; then
          echo "::warning::Trivy scan failed or did not produce output, creating empty SARIF"
          cat > trivy-results.sarif << 'EOF'
        {
          "$schema": "https://json.schemastore.org/sarif-2.1.0.json",
          "version": "2.1.0",
          "runs": [
            {
              "tool": {
                "driver": {
                  "name": "Trivy",
                  "informationUri": "https://github.com/aquasecurity/trivy",
                  "version": "unknown",
                  "rules": []
                }
              },
              "results": [],
              "invocations": [
                {
                  "executionSuccessful": false,
                  "toolExecutionNotifications": [
                    {
                      "message": {
                        "text": "Trivy scan failed to execute or produce results. Check workflow logs for details."
                      },
                      "level": "error"
                    }
                  ]
                }
              ]
            }
          ]
        }
        EOF
        fi

    - name: Upload Trivy SARIF
      if: inputs.enabled == 'true' && always()
      continue-on-error: true
      uses: github/codeql-action/upload-sarif@7434149006143a4d75b82a2f411ef15b03ccc2d7  # v4.32.2
      with:
        sarif_file: trivy-results.sarif
        category: trivy-${{ inputs.environment }}
        wait-for-processing: true

    - name: Set outcome
      id: result
      if: always()
      shell: bash
      run: |
        if [ "${{ inputs.enabled }}" != "true" ]; then
          echo "outcome=skipped" >> $GITHUB_OUTPUT
          echo "⏭️ Trivy: Skipped (disabled)"
        elif [ "${{ steps.scan.outcome }}" == "success" ]; then
          echo "outcome=success" >> $GITHUB_OUTPUT
          echo "✅ Trivy: Passed"
        else
          echo "outcome=failure" >> $GITHUB_OUTPUT
          echo "❌ Trivy: Failed (scan outcome: ${{ steps.scan.outcome }})"
          # Exit with appropriate code based on continue-on-error setting
          if [ "${{ inputs.continue-on-error }}" != "true" ]; then
            exit 1
          fi
        fi
