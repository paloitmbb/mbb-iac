name: ♻️ Archive Repository
description: Request to archive an existing GitHub repository
title: "[REPO ARCHIVE]"
labels: ["archive"]

body:
  - type: markdown
    attributes:
      value: |
        ## Archive Repository Request
        Use this template to request the archiving of an existing GitHub repository.
        **⚠️ Important:** Archiving a repository makes it **read-only**. All code, issues, pull requests, and other data will be preserved but no new commits, issues, or PRs can be created.

  - type: input
    id: repo-name
    attributes:
      label: Repository Name
      description: The exact name of the repository to archive
      placeholder: my-project
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Business Justification
      description: Explain why this repository should be archived
      placeholder: |
        e.g.,
        - Project has been decommissioned
        - Code has been migrated to a new repository
        - Project is no longer maintained
        - Replaced by another solution
    validations:
      required: true

  - type: dropdown
    id: replacement
    attributes:
      label: Is there a replacement repository?
      options:
        - "No"
        - "Yes"
    validations:
      required: false

  - type: input
    id: replacement-repo-name
    attributes:
      label: Replacement Repository Name
      description: >
        If you selected "Yes" above, provide the exact name of the
        replacement repository in this organisation.
        Leave blank if there is no replacement.
      placeholder: my-new-project
    validations:
      required: false

  - type: checkboxes
    id: repo-action-checklist
    attributes:
      label: Repository Action Checklist
      description: Please confirm all relevant items are completed before submitting
      options:
        - label: Stakeholders and contributors have been notified
          required: true
        - label: Any active CI/CD pipelines have been reviewed and updated/disabled as needed
          required: false
        - label: Final release/tag has been created (if applicable)
          required: false  # optional — not always needed
