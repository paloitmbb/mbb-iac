name: Archive Repository
description: Request to archive an existing GitHub repository
title: "[REPO ARCHIVE]"
labels: ["archive"]

body:
  - type: markdown
    attributes:
      value: |
        ## Archive Repository Request
        Use this template to request the archiving of an existing GitHub repository.
        **⚠️ Important:** Archiving a repository makes it **read-only**. All code, issues, pull requests, and other data will be preserved but no new commits, issues, or PRs can be created.

  - type: input
    id: repo-name
    attributes:
      label: Repository Name
      description: The exact name of the repository to archive
      placeholder: my-project
    validations:
      required: true

  - type: dropdown
    id: repo-visibility
    attributes:
      label: Current Repository Visibility
      options:
        - private
        - public
        - internal
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Business Justification
      description: Explain why this repository should be archived
      placeholder: |
        e.g.,
        - Project has been decommissioned
        - Code has been migrated to a new repository
        - Project is no longer maintained
        - Replaced by another solution
    validations:
      required: true

  - type: dropdown
    id: replacement
    attributes:
      label: Is there a replacement repository?
      options:
        - "No"
        - "Yes"
    validations:
      required: true
  
  - type: input
    id: replacement-repo-name
    attributes:
      label: Replacement Repository Name
      description: >
        If you selected "Yes" above, provide the exact name of the 
        replacement repository in this organisation.
        Leave blank if there is no replacement.
      placeholder: my-new-project
    validations:
      required: false

  - type: checkboxes
    id: pre-archive-tasks
    attributes:
      label: Pre-Archive Checklist
      description: All items must be checked before submitting
      options:
        - label: All open PRs have been merged or closed
          required: true
        - label: All open issues have been resolved, transferred, or closed
          required: true
        - label: README has been updated with archive notice
          required: true
        - label: Stakeholders and contributors have been notified
          required: true
        - label: Any active CI/CD pipelines have been disabled
          required: true
        - label: Repository secrets have been reviewed
          required: true
        - label: Dependent services/projects have been updated
          required: true
        - label: Final release/tag has been created (if applicable)
          required: false  # optional — not always needed

  - type: markdown
    attributes:
      value: |
        ---
        ### What happens next?
        1. ✅ This request will be reviewed by the infrastructure team
        2. 🔍 Pre-archive checklist items will be verified
        3. 🧱 The repository will be archived via Terraform (`archived = true`)
        4. 📝 The `data/repositories.yaml` will be updated
        5. 🗃️ The repository will become **read-only** on GitHub

        ### Terraform Changes Required
        - The `archived` field for the repository in `data/repositories.yaml` will be set to `true`
        - A pull request will be raised for review before merging
