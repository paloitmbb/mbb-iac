name: "♻️ GHES → GHEC Migration Request"
description: "Request migration of a repository from GitHub Enterprise Server (GHES) to GitHub Enterprise Cloud (GHEC) using GEI CLI"
title: "[GHES Migration] "
labels: ["ghes-to-ghec-migration"]
body:
  - type: markdown
    attributes:
      value: |
        ## MBB GHES → GHEC Repository Migration
        Use this form to request migration of a repository from **GitHub Enterprise Server (GHES)** to **GitHub Enterprise Cloud (GHEC)**.

        # > **Prerequisites:**
        # > - Source GHES instance must be accessible and have Migrations enabled in Management Console
        # > - Target organization must exist on GitHub.com (GHEC)
        # > - `GH_SOURCE_PAT` must have read access to the GHES source repository
        # > - `GH_TARGET_PAT` must have write access to the GHEC target organization

  - type: markdown
    attributes:
      value: |
        ### Source (GHES)

  - type: dropdown
    id: source_organization
    attributes:
      label: "Source Organization"
      description: "The organization name on the GHES instance that owns the repository"
      options:
        - MSS-DB 
        - MSS-ENGINEERING
        - MSS-DEVOPS
        - MSS-CFS-DB
        - ETIQA 
        - ETIQA-CHANNELS

    validations:
      required: true

  - type: input
    id: source_repo
    attributes:
      label: "Source Repository Name"
      description: "The exact repository name on GHES to migrate"
      placeholder: "Source repository name"
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ### Target (GHEC)

  - type: dropdown
    id: target_organization
    attributes:
      label: "Target Organization"
      description: "The target GitHub.com (GHEC) organization where the repository will be migrated to"
      options:
        - maybank-ghes
        - maybank-group
    validations:
      required: true

  - type: input
    id: target_repo
    attributes:
      label: "Target Repository Name"
      description: "Name for the repository at the destination (leave same as source if unchanged)"
      placeholder: "Target repository name <org><region>-<dept>-<type>[tiering-optional]-<name>"
    validations:
      required: true
      pattern:
        value: '^[a-z0-9]+(-[a-z0-9]+)+$'
        message: >-
          Repository name must follow the naming convention (e.g., mbbmy-dbdo-app-mae-mobile).
          Use lowercase alphanumeric segments separated by hyphens.

  - type: dropdown
    id: application_tier
    attributes:
      label: "Application Tier"
      description: "Classification tier of the application (affects SLA and support priority)"
      options:
        - Tier 1 - Mission Critical
        - Tier 2 - Business Critical
        - Tier 3 - Business Operational
        - Tier 4 - Administrative
    validations:
      required: true

  - type: textarea
    id: team_mappings
    attributes:
      label: "Team Access Mappings (Optional)"
      description: |
        Map source teams to target teams for repository access. One mapping per line.
        Format: `<source-team-slug> → <target-team-slug> : <permission>`
        Permissions: pull, push, admin, maintain, triage
      placeholder: |
        mss-devsecops-team : admin
        platform-team : push
        qa-team : triage

  - type: textarea
    id: justification
    attributes:
      label: "Justification"
      description: "Reason for initiating this migration"
      placeholder: "e.g., Transferring repository to a new organization"
    validations:
      required: true

  - type: checkboxes
    id: confirmation
    attributes:
      label: "Confirmation"
      description: "Please confirm the following before submitting"
      options:
        - label: "I have verified the source repository name and owner/organization are correct"
          required: true
        - label: "I have notified the repository owners about this migration"
          required: true
        - label: "I understand there will be a brief freeze period during migration"
          required: true
