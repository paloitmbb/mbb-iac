name: Terraform CI - GitHub Provider

on:
  pull_request:
    paths:
      - "environments/**/*.tfvars"
      - "data/**/*.yaml"
      - "data/**/*.yml"
      - "modules/**/*.tf"
      - "*.tf"

  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - production
        default: 'dev'

      terraform-version:
        description: 'Terraform version'
        required: false
        type: string
        default: '1.14.5'

      enable-tfsec:
        description: 'Enable tfsec scanning'
        required: false
        type: boolean
        default: true

      enable-trivy:
        description: 'Enable Trivy scanning'
        required: false
        type: boolean
        default: true

      tfsec-severity:
        description: 'tfsec minimum severity to fail on'
        required: false
        type: choice
        options:
          - LOW
          - MEDIUM
          - HIGH
          - CRITICAL
        default: 'CRITICAL'

      trivy-severity:
        description: 'Trivy minimum severity to fail on'
        required: false
        type: choice
        options:
          - LOW
          - MEDIUM
          - HIGH
          - CRITICAL
        default: 'HIGH'

# Prevent concurrent runs
concurrency:
  group: terraform-ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  terraform-ci:
    name: Terraform CI (${{ inputs.environment || 'dev' }})
    permissions:
      contents: read
      security-events: write
      id-token: write
      pull-requests: write
      actions: read
      attestations: write
    uses: paloitmbb/mbb-tf-workflows/.github/workflows/terraform-ci-github.yml@main
    with:
      terraform-version: ${{ vars.TERRAFORM_VERSION || '1.14.5' }}
      working-directory: '.'
      environment: ${{ inputs.environment || 'dev' }}
      backend-config-file: environments/${{ inputs.environment || 'dev' }}/backend.tfvars
      terraform-var-file: environments/${{ inputs.environment || 'dev' }}/terraform.tfvars

      # Code Quality Scanning
      enable-tflint: false  # Temporarily disabled - fix unused variables first
      tflint-version: 'v0.60.0'

      # Security Scanning
      enable-tfsec: ${{ github.event_name != 'workflow_dispatch' || inputs.enable-tfsec }}
      # Trivy is handled by the standalone trivy-scan job below to use a current
      # version of aquasecurity/trivy-action, bypassing the broken pinned version
      # in mbb-tf-actions (v0.33.1 was affected by the March 2026 security incident).
      enable-trivy: false
      tfsec-severity: ${{ inputs.tfsec-severity || 'CRITICAL' }}
      trivy-severity: ${{ inputs.trivy-severity || 'HIGH' }}

      # Continue-on-error Control
      # Individual scanners continue to allow all scans to complete
      tfsec-continue-on-error: true
      trivy-continue-on-error: true
      # Aggregate enforces security gate: fail CI if any scanner fails
      aggregate-continue-on-error: false

      # Terraform Configuration
      enable-pr-comment: true
      runner-os: ${{ vars.RUNNER_OS || 'ubuntu-latest' }}
      timeout-minutes: 60
    secrets:
      ORG_GITHUB_TOKEN: ${{ secrets.ORG_GITHUB_TOKEN }}
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}

  # Standalone Trivy scan job using aquasecurity/trivy-action@v0.34.2 directly.
  # The mbb-tf-actions/security-scan-trivy composite action pins v0.33.1 via a
  # commit hash that stopped working after the Trivy security incident in early
  # March 2026 (mass deletion of releases from the aquasecurity/trivy-action repo).
  # By running Trivy here with a current tagged release, we ensure the SARIF file
  # is always generated and uploaded to the GitHub Security tab.
  trivy-scan:
    name: 🔒 Security Scan - Trivy
    runs-on: ${{ vars.RUNNER_OS || 'ubuntu-latest' }}
    timeout-minutes: 15
    continue-on-error: true
    if: github.event_name != 'workflow_dispatch' || inputs.enable-trivy == true
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy config scanner
        id: trivy
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.34.2
        with:
          scan-type: 'config'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: ${{ inputs.trivy-severity || 'HIGH' }}
          exit-code: '0'

      - name: Upload Trivy SARIF to GitHub Security tab
        if: always() && hashFiles('trivy-results.sarif') != ''
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-${{ inputs.environment || 'dev' }}
          wait-for-processing: true

      - name: Trivy scan summary
        if: always()
        shell: bash
        run: |
          echo "## 🔒 Trivy Security Scan" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.trivy.outcome }}" == "success" ] && [ -f "trivy-results.sarif" ]; then
            echo "**Status:** ✅ Passed" >> $GITHUB_STEP_SUMMARY
            echo "✅ Trivy: Passed"
          elif [ ! -f "trivy-results.sarif" ]; then
            echo "**Status:** ⚠️ SARIF file not generated - scan may have errored" >> $GITHUB_STEP_SUMMARY
            echo "::warning::Trivy SARIF file not generated - scan may have errored"
          else
            echo "**Status:** ⚠️ Issues found (see GitHub Security tab)" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ Trivy: Issues found (see GitHub Security tab)"
          fi
