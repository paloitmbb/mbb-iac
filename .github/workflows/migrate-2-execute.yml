name: "State Migration: 2 - Execute Split"

# =============================================================================
# Step 2 of 3: Pull the monolithic state and split it into shard state files.
#
# This workflow:
#   1. Inits the monolithic root config
#   2. Pulls the remote state to a local terraform.tfstate
#   3. Re-runs migrate-to-shards.sh to regenerate the migration script
#   4. Executes the migration script (terraform state mv — local files only)
#   5. Prints a resource count summary per output state file
#   6. Uploads the output .tfstate files as artifacts for step 3
#
# ⚠️  This workflow does NOT push anything to any backend.
#     All changes are local to the runner and discarded after upload.
#
# Prerequisites:
#   - Run migrate-1-generate.yml first and review the generated script
#   - Provide the run ID from step 1 to use its artifact
#
# After this workflow:
#   - Download artifacts and inspect the state lists in the job logs
#   - Trigger migrate-3-push-verify.yml with this workflow's run ID
# =============================================================================

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - production
        default: dev
      generate-run-id:
        description: "Run ID from 'State Migration: 1 - Generate Plan' (for audit trail)"
        required: false
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: state-migration-${{ github.ref }}
  cancel-in-progress: false

jobs:
  execute:
    name: "✂️ Split monolithic state into shards"
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ vars.TERRAFORM_VERSION || '1.14.5' }}
          terraform_wrapper: false

      - name: Install Python dependencies
        run: pip install pyyaml --quiet

      - name: Terraform Init (monolithic root)
        run: |
          terraform init \
            -backend-config="environments/${{ inputs.environment }}/backend.tfvars"
        env:
          GITHUB_TOKEN: ${{ secrets.ORG_GITHUB_TOKEN }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: true

      - name: Pull monolithic state
        run: |
          terraform state pull > terraform.tfstate
          RESOURCE_COUNT=$(terraform state list -state=terraform.tfstate 2>/dev/null | wc -l | tr -d ' ')
          echo "Pulled $RESOURCE_COUNT resources from monolithic state"
          if [ "$RESOURCE_COUNT" -eq 0 ]; then
            echo "❌ Monolithic state is empty — nothing to migrate"
            exit 1
          fi
          echo "MONOLITH_COUNT=$RESOURCE_COUNT" >> "$GITHUB_ENV"
        env:
          GITHUB_TOKEN: ${{ secrets.ORG_GITHUB_TOKEN }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: true

      - name: Generate migration script
        run: ./scripts/migrate-to-shards.sh "${{ inputs.environment }}"
        env:
          GITHUB_TOKEN: ${{ secrets.ORG_GITHUB_TOKEN }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: true

      - name: Switch to local backend (required for state mv with local files)
        run: |
          # Disable the remote backend so that `terraform state mv -state=A -state-out=B`
          # operates purely on local files. With a remote backend configured, Terraform
          # initializes the -state-out file from the remote backend, causing every
          # resource to appear in both output files (count doubles instead of splitting).
          terraform init -backend=false -reconfigure
        env:
          GITHUB_TOKEN: ${{ secrets.ORG_GITHUB_TOKEN }}

      - name: Pre-create empty output state files
        run: |
          # When terraform state mv -state-out=X is used and X does not exist, Terraform
          # initialises X as a full copy of the source state before moving the resource.
          # This causes every resource to appear in the output file even if it was not
          # explicitly moved there. Pre-creating empty (but valid) state files prevents
          # the copy-on-create behaviour.
          python3 - << 'PYEOF'
          import json, uuid

          # Discover all shard output filenames from the migration script
          import re, subprocess
          script_path = f"/tmp/migration-commands-${{ inputs.environment }}.sh"
          with open(script_path) as f:
              content = f.read()

          # Collect all -state-out filenames
          output_files = set(re.findall(r'-state-out=(\S+\.tfstate)', content))
          output_files.discard('terraform.tfstate')  # never pre-create source

          for fname in sorted(output_files):
              empty = {
                  "version": 4,
                  "terraform_version": "1.14.5",
                  "serial": 0,
                  "lineage": str(uuid.uuid4()),
                  "outputs": {},
                  "resources": [],
                  "check_results": None
              }
              with open(fname, 'w') as f:
                  json.dump(empty, f)
              print(f"Created empty state: {fname}")
          PYEOF

      - name: Execute migration (local state mv only)
        run: bash /tmp/migration-commands-${{ inputs.environment }}.sh

      - name: Verify output state files
        run: |
          # Use Python to count resource instances directly from the JSON state files.
          # This bypasses `terraform state list -state=X` which ignores the -state flag
          # when a backend (even local) is configured and falls back to the backend state.
          python3 - << 'PYEOF'
          import json, glob, sys, os

          def count_instances(path):
              """Count managed resource instances in a Terraform state JSON file."""
              try:
                  with open(path) as f:
                      d = json.load(f)
              except (FileNotFoundError, json.JSONDecodeError):
                  return 0, []
              addresses = []
              for res in d.get('resources', []):
                  if res.get('mode', 'managed') != 'managed':
                      continue
                  mod  = res.get('module', '')
                  rtype = res['type']
                  rname = res['name']
                  for inst in res.get('instances', []):
                      key = inst.get('index_key')
                      base = f"{mod}.{rtype}.{rname}" if mod else f"{rtype}.{rname}"
                      addr = f"{base}[{json.dumps(key)}]" if key is not None else base
                      addresses.append(addr)
              return len(addresses), addresses

          monolith_count = int(os.environ['MONOLITH_COUNT'])

          # global.tfstate
          g_count, g_addrs = count_instances('global.tfstate')
          print('=== global.tfstate ===')
          for a in sorted(g_addrs): print(' ', a)
          print(f'  → {g_count} resources')

          # shard output files (primary + any -002, -003, etc.)
          shard_count = 0
          for path in sorted(glob.glob('shard-*.tfstate')):
              s_count, s_addrs = count_instances(path)
              print(f'\n=== {path} ===')
              for a in sorted(s_addrs): print(' ', a)
              print(f'  → {s_count} resources')
              shard_count += s_count

          total = g_count + shard_count
          print('\n─────────────────────────────────')
          print(f'Monolith:  {monolith_count} resources')
          print(f'Global:    {g_count} resources')
          print(f'Shards:    {shard_count} resources')
          print(f'Total out: {total} resources')

          if total != monolith_count:
              print('\n❌ Resource count mismatch — some resources may not have been mapped.')
              print('   Review the WARNING comments in /tmp/migration-commands-${{ inputs.environment }}.sh')
              sys.exit(1)

          print('✅ All resources accounted for')
          PYEOF

      - name: Upload output state files
        uses: actions/upload-artifact@v4
        with:
          name: split-states-${{ inputs.environment }}-${{ github.run_id }}
          path: |
            global.tfstate
            shard-*.tfstate
          retention-days: 3

      - name: Summary
        run: |
          echo "## ✅ State split complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** \`${{ inputs.environment }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**This run ID:** \`${{ github.run_id }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Monolith resource count:** \`${{ env.MONOLITH_COUNT }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> ⚠️ No backend was modified. Output state files are in the artifact only." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next steps" >> $GITHUB_STEP_SUMMARY
          echo "1. Review the resource counts in the **Verify output state files** step above" >> $GITHUB_STEP_SUMMARY
          echo "2. Trigger **State Migration: 3 - Push & Verify** with:" >> $GITHUB_STEP_SUMMARY
          echo "   - Environment: \`${{ inputs.environment }}\`" >> $GITHUB_STEP_SUMMARY
          echo "   - Artifact run ID: \`${{ github.run_id }}\`" >> $GITHUB_STEP_SUMMARY
