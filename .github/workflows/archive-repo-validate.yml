name: "Archive Repo: Validate & Create PR"

on:
  issues:
    types: [opened]

permissions:
  issues: write
  contents: write
  pull-requests: write

concurrency:
  group: archive-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  # ============================================================================
  # Job 1: Validate Archive Request
  # ============================================================================
  validate-request:
    name: Validate Archive Request
    runs-on: ubuntu-latest
    if: startsWith(github.event.issue.title, '[REPO ARCHIVE]')
    timeout-minutes: 20
    outputs:
      validation-passed: ${{ steps.validate.outputs.validation-passed }}
      repo-name: ${{ steps.parse.outputs.repo-name }}
      justification: ${{ steps.parse.outputs.justification }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ORG_GITHUB_TOKEN }}
          ref: main

      # -----------------------------------------------------------------------
      # Step 1: Parse issue body to extract fields
      # -----------------------------------------------------------------------
      - name: Parse issue form
        id: parse
        shell: bash
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          # Extract a field value from a GitHub issue form body.
          # Fields follow the pattern: ### <Label>\n\n<value>\n\n### <Next Label>
          extract_field() {
            local label="$1"
            printf '%s\n' "$ISSUE_BODY" | awk -v label="### ${label}" '
              $0 == label { found=1; next }
              found && /^### /  { exit }
              found && NF > 0   { print }
            ' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//'
          }

          REPO_NAME=$(extract_field "Repository Name")
          JUSTIFICATION=$(extract_field "Business Justification")

          # Treat "_No response_" as empty
          [[ "$REPO_NAME"     == "_No response_" ]] && REPO_NAME=""
          [[ "$JUSTIFICATION" == "_No response_" ]] && JUSTIFICATION=""

          echo "repo-name=${REPO_NAME}" >> "$GITHUB_OUTPUT"

          echo "justification<<PARSEEOF" >> "$GITHUB_OUTPUT"
          echo "${JUSTIFICATION}" >> "$GITHUB_OUTPUT"
          echo "PARSEEOF" >> "$GITHUB_OUTPUT"

          echo "Parsed repo-name:     ${REPO_NAME}"
          echo "Parsed justification: ${JUSTIFICATION}"

      # -----------------------------------------------------------------------
      # Step 2: Validate repository and YAML config
      # -----------------------------------------------------------------------
      - name: Validate repository
        id: validate
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.ORG_GITHUB_TOKEN }}
          ORG_NAME: ${{ github.repository_owner }}
        run: |
          set -e  # Exit on any error

          REPO_NAME="${{ steps.parse.outputs.repo-name }}"
          VALIDATION_PASSED="false"
          VALIDATION_ERRORS=""
          VALIDATION_SUMMARY=""

          echo "🔍 Starting validation for repository: ${REPO_NAME:-'(empty)'}"

          # --- Check required fields ---
          if [[ -z "$REPO_NAME" ]]; then
            VALIDATION_ERRORS="${VALIDATION_ERRORS}\n- ❌ Repository name is required"
            VALIDATION_SUMMARY="${VALIDATION_SUMMARY}| Repository Name | \`(empty)\` | ❌ Missing |\n"
            echo "❌ Repository name is empty"
          else
            VALIDATION_SUMMARY="${VALIDATION_SUMMARY}| Repository Name | \`${REPO_NAME}\` | ✅ Provided |\n"
            echo "✅ Repository name provided: ${REPO_NAME}"

            # --- Check if repository exists on GitHub ---
            echo "📡 Checking if repository exists on GitHub..."
            API_RESPONSE=$(gh api "repos/${ORG_NAME}/${REPO_NAME}" 2>/dev/null || true)
            API_EXIT_CODE=$?

            if [[ $API_EXIT_CODE -eq 0 && -n "$API_RESPONSE" ]]; then
              # Repo exists — check if archived
              IS_ARCHIVED=$(echo "$API_RESPONSE" | jq -r '.archived // "false"')
              if [[ "$IS_ARCHIVED" == "true" ]]; then
                VALIDATION_ERRORS="${VALIDATION_ERRORS}\n- ❌ Repository \`${REPO_NAME}\` is already archived"
                VALIDATION_SUMMARY="${VALIDATION_SUMMARY}| Repository Exists | \`${ORG_NAME}/${REPO_NAME}\` | ❌ Already archived |\n"
                echo "❌ Repository is already archived"
              else
                VALIDATION_SUMMARY="${VALIDATION_SUMMARY}| Repository Exists | \`${ORG_NAME}/${REPO_NAME}\` | ✅ Found (Active) |\n"
                echo "✅ Repository found and active"

                # --- Check if repository exists in YAML config ---
                if [[ -f "data/repositories.yaml" ]]; then
                  echo "📋 Checking YAML configuration..."
                  if grep -qP "^\s+-?\s*name:\s+['\"]?${REPO_NAME}['\"]?\s*$" data/repositories.yaml; then
                    VALIDATION_SUMMARY="${VALIDATION_SUMMARY}| YAML Config | \`data/repositories.yaml\` | ✅ Found |\n"
                    VALIDATION_PASSED="true"
                    echo "✅ Repository found in YAML config"
                  else
                    VALIDATION_ERRORS="${VALIDATION_ERRORS}\n- ❌ Repository \`${REPO_NAME}\` not found in \`data/repositories.yaml\`"
                    VALIDATION_SUMMARY="${VALIDATION_SUMMARY}| YAML Config | \`data/repositories.yaml\` | ❌ Not found |\n"
                    echo "❌ Repository not found in YAML config"
                  fi
                else
                  VALIDATION_ERRORS="${VALIDATION_ERRORS}\n- ⚠️ File \`data/repositories.yaml\` not found"
                  VALIDATION_SUMMARY="${VALIDATION_SUMMARY}| YAML Config | \`data/repositories.yaml\` | ⚠️ File missing |\n"
                  echo "⚠️ YAML config file not found"
                fi
              fi
            else
              # Repository not found or API error
              echo "❌ Repository not found or API error"
              VALIDATION_ERRORS="${VALIDATION_ERRORS}\n- ❌ Repository \`${ORG_NAME}/${REPO_NAME}\` not found on GitHub"
              VALIDATION_SUMMARY="${VALIDATION_SUMMARY}| Repository Exists | \`${ORG_NAME}/${REPO_NAME}\` | ❌ Not found |\n"
            fi
          fi

          # --- Build full summary ---
          FULL_SUMMARY="| Check | Detail | Result |\n|-------|--------|--------|\n${VALIDATION_SUMMARY}"
          if [[ -n "$VALIDATION_ERRORS" ]]; then
            FULL_SUMMARY="${FULL_SUMMARY}\n### Errors\n${VALIDATION_ERRORS}"
          fi

          # --- Set outputs (always set, even if empty) ---
          echo "validation-passed=${VALIDATION_PASSED}" >> $GITHUB_OUTPUT

          echo "validation-summary<<VSEOF" >> $GITHUB_OUTPUT
          echo -e "$FULL_SUMMARY" >> $GITHUB_OUTPUT
          echo "VSEOF" >> $GITHUB_OUTPUT

          echo "validation-errors<<VEEOF" >> $GITHUB_OUTPUT
          echo -e "$VALIDATION_ERRORS" >> $GITHUB_OUTPUT
          echo "VEEOF" >> $GITHUB_OUTPUT

          echo "✅ Validation complete. Passed: ${VALIDATION_PASSED}"

      # -----------------------------------------------------------------------
      # Step 3: Build validation details
      # -----------------------------------------------------------------------
      - name: Build validation details
        if: always()
        id: build-details
        shell: bash
        env:
          JUSTIFICATION: ${{ steps.parse.outputs.justification }}
          VALIDATION_TABLE: ${{ steps.validate.outputs.validation-summary }}
          VALIDATION_ERRORS: ${{ steps.validate.outputs.validation-errors }}
        run: |
          REPO_NAME="${{ steps.parse.outputs.repo-name }}"
          ORG_NAME="${{ github.repository_owner }}"
          JUSTIFICATION="${JUSTIFICATION}"
          VALIDATION_PASSED="${{ steps.validate.outputs.validation-passed }}"
          VALIDATION_TABLE="${VALIDATION_TABLE}"
          VALIDATION_ERRORS="${VALIDATION_ERRORS}"

          # --- Build summary-table JSON ---
          SUMMARY_TABLE=$(jq -nc \
            --arg repo "$REPO_NAME" \
            --arg org "$ORG_NAME" \
            --arg justification "${JUSTIFICATION:-_Not provided_}" \
            '[
              {field: "Repository Name", value: ("`" + $repo + "`")},
              {field: "Organization", value: ("`" + $org + "`")},
              {field: "Business Justification", value: $justification}
            ]')

          # --- Build details-sections JSON ---
          ARCHIVE_WARNING="⚠️ **Archiving a repository will:**\n- Make the repository **read-only**\n- Disable push access, issues, pull requests, labels, milestones, projects, wiki, releases, commits, tags, branches, reactions, and comments\n- The repository will still be **visible** and **cloneable**\n- This action **can be reversed** by unarchiving the repository"

          DETAILS_JSON=$(jq -nc \
            --arg validation "$VALIDATION_TABLE" \
            --arg warning "$ARCHIVE_WARNING" \
            '[
              {heading: "🔍 Validation Results", body: $validation},
              {heading: "⚠️ Archive Impact", body: $warning}
            ]')

          # --- Build next-steps ---
          if [[ "$VALIDATION_PASSED" == "true" ]]; then
            NEXT_STEPS="- A PR will be created to update \`data/repositories.yaml\` with \`archived: true\`
          - **Terraform CI** will automatically run \`terraform plan\` on the PR and post results as a comment
          - A reviewer must **review the plan**, then **approve and merge** the PR
          - Once merged, the **Terraform Apply** workflow runs automatically against the \`dev\` environment
          - This issue will be **closed automatically** when the PR merges"
          else
            NEXT_STEPS=""
          fi

          # --- Build error-details ---
          if [[ "$VALIDATION_PASSED" != "true" && -n "$VALIDATION_ERRORS" ]]; then
            ERROR_DETAILS="${VALIDATION_ERRORS}\n\nPlease fix the validation errors above and create a new archive request issue."
          else
            ERROR_DETAILS=""
          fi

          # --- Validate JSON ---
          for json_var in "$SUMMARY_TABLE" "$DETAILS_JSON"; do
            if ! echo "$json_var" | jq empty 2>/dev/null; then
              echo "::error::Failed to build valid JSON"
              exit 1
            fi
          done

          # --- Set outputs ---
          echo "summary-table<<STEOF" >> $GITHUB_OUTPUT
          echo "$SUMMARY_TABLE" >> $GITHUB_OUTPUT
          echo "STEOF" >> $GITHUB_OUTPUT

          echo "details-json<<DJEOF" >> $GITHUB_OUTPUT
          echo "$DETAILS_JSON" >> $GITHUB_OUTPUT
          echo "DJEOF" >> $GITHUB_OUTPUT

          echo "next-steps<<NSEOF" >> $GITHUB_OUTPUT
          echo -e "$NEXT_STEPS" >> $GITHUB_OUTPUT
          echo "NSEOF" >> $GITHUB_OUTPUT

          echo "error-details<<EDEOF" >> $GITHUB_OUTPUT
          echo -e "$ERROR_DETAILS" >> $GITHUB_OUTPUT
          echo "EDEOF" >> $GITHUB_OUTPUT

      # -----------------------------------------------------------------------
      # Step 4: Notify validation result on the issue
      # -----------------------------------------------------------------------
      - name: Notify validation result
        if: success() || failure()
        uses: actions/github-script@v7
        env:
          VALIDATION_PASSED: ${{ steps.validate.outputs.validation-passed }}
          SUMMARY_TABLE: ${{ steps.build-details.outputs.summary-table }}
          DETAILS_JSON: ${{ steps.build-details.outputs.details-json }}
          NEXT_STEPS: ${{ steps.build-details.outputs.next-steps }}
          ERROR_DETAILS: ${{ steps.build-details.outputs.error-details }}
        with:
          github-token: ${{ secrets.ORG_GITHUB_TOKEN }}
          script: |
            try {
              const passed = process.env.VALIDATION_PASSED === 'true';
              const summaryRows = JSON.parse(process.env.SUMMARY_TABLE || '[]');
              const detailSections = JSON.parse(process.env.DETAILS_JSON || '[]');
              const nextSteps = process.env.NEXT_STEPS || '';
              const errorDetails = process.env.ERROR_DETAILS || '';

              const title = passed
                ? '## ✅ Archive Request — Validation Passed'
                : '## ❌ Archive Request — Validation Failed';

              let body = `${title}\n\n`;

              // Summary table
              body += '### 📋 Request Summary\n\n';
              body += '| Field | Value |\n|-------|-------|\n';
              for (const row of summaryRows) {
                body += `| **${row.field}** | ${row.value} |\n`;
              }
              body += '\n';

              // Detail sections
              for (const section of detailSections) {
                body += `### ${section.heading}\n\n${section.body}\n\n`;
              }

              // Error details
              if (errorDetails) {
                body += `### ⚠️ Errors\n\n${errorDetails}\n\n`;
              }

              // Next steps
              if (nextSteps) {
                body += `### 📝 Next Steps\n\n${nextSteps}\n`;
              } else if (!passed) {
                body += '### 📝 Next Steps\n\nPlease fix the validation errors above and create a new archive request issue.\n';
              }

              // Post comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });

              // Add labels
              const label = passed ? 'archive-validation-passed' : 'archive-validation-failed';
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: [label],
              });

              // Close issue on failure
              if (!passed) {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  state: 'closed',
                  state_reason: 'completed',
                });
              }
            } catch (error) {
              console.error('Error posting validation comment:', error);
              core.setFailed(`Failed to notify validation result: ${error.message}`);
            }

  # ============================================================================
  # Job 2: Create PR with YAML change
  # ============================================================================
  create-archive-pr:
    name: Create Archive PR
    runs-on: ubuntu-latest
    needs: validate-request
    timeout-minutes: 20
    if: needs.validate-request.outputs.validation-passed == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ORG_GITHUB_TOKEN }}
          ref: main

      # -----------------------------------------------------------------------
      # Step 1: Create branch and update YAML
      # -----------------------------------------------------------------------
      - name: Create branch and PR
        id: create-pr
        shell: bash
        env:
          JUSTIFICATION: ${{ needs.validate-request.outputs.justification }}
          GH_TOKEN: ${{ secrets.ORG_GITHUB_TOKEN }}
        run: |
          set -e  # Exit on any error
          
          REPO_NAME="${{ needs.validate-request.outputs.repo-name }}"
          ORG_NAME="${{ github.repository_owner }}"
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          BRANCH_NAME="archive/${REPO_NAME}-${ISSUE_NUMBER}"

          echo "📌 Archive Request Details:"
          echo "  Repository: ${ORG_NAME}/${REPO_NAME}"
          echo "  Branch: ${BRANCH_NAME}"
          echo "  Issue: #${ISSUE_NUMBER}"

          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Delete remote branch if it exists (ignore errors)
          git push origin --delete "${BRANCH_NAME}" 2>/dev/null || true
          
          # Create and switch to feature branch
          git checkout -b "${BRANCH_NAME}"
          echo "✅ Created branch: ${BRANCH_NAME}"

          # --- UPDATE YAML FILE ---
          echo "📝 Updating data/repositories.yaml..."
          echo "Current working directory: $(pwd)"
          echo "Contents of data directory:"
          ls -la data/ || echo "data directory not found"
          
          YAML_FILE="data/repositories.yaml"
          if [[ ! -f "$YAML_FILE" ]]; then
            echo "::error::File $YAML_FILE not found"
            echo "::error::Please ensure repositories.yaml exists at: $PWD/$YAML_FILE"
            exit 1
          fi
          echo "✅ Found: $YAML_FILE"

          # Use sed to add archived: true before the security section for the repository
          echo "Applying sed to add archived: true for REPO_NAME='$REPO_NAME'"
          sed -i '/- name: '${REPO_NAME}'/,/security:/{/^    security:/ s/^/    archived: true\n/}' "$YAML_FILE"

          # Verify the change
          echo "Verifying archived flag was set..."
          if grep -A 20 "- name: ${REPO_NAME}" "$YAML_FILE" | grep -q "archived: true"; then
            echo "✅ YAML file updated successfully"
          else
            echo "::error::Failed to set archived: true for ${REPO_NAME}"
            exit 1
          fi

          # Check if there are changes
          if ! git diff --quiet "$YAML_FILE"; then
            echo "✅ Changes detected in $YAML_FILE"
          else
            echo "⚠️ No changes in $YAML_FILE (repository may already be marked as archived)"
          fi

          # Stage and commit the YAML change
          git add "$YAML_FILE"
          
          # Build commit message (using heredoc to avoid indentation issues)
          COMMIT_MSG=$(cat <<EOF
          feat: 🗃️ archive repository '${REPO_NAME}'

          Set archived: true for ${ORG_NAME}/${REPO_NAME} in data/repositories.yaml

          - Repository: ${ORG_NAME}/${REPO_NAME}
          - Requested by: @${{ github.event.issue.user.login }}
          - Issue: #${ISSUE_NUMBER}

          Related to #${ISSUE_NUMBER}
          EOF
          )

          git commit -m "$COMMIT_MSG" || {
            echo "⚠️ Nothing to commit (repository may already be archived)"
          }

          # Push the branch
          git push origin "${BRANCH_NAME}" || {
            echo "::error::Failed to push branch"
            exit 1
          }
          echo "✅ Branch pushed to origin"

          # --- CREATE PULL REQUEST ---
          echo "🔄 Creating pull request..."

          # Build PR body (using heredoc for proper formatting)
          PR_BODY=$(cat <<EOF
          ## 🗃️ Archive Repository: \`${REPO_NAME}\`

          ### Summary
          | Field | Value |
          |-------|-------|
          | **Repository** | \`${ORG_NAME}/${REPO_NAME}\` |
          | **Requested by** | @${{ github.event.issue.user.login }} |
          | **Justification** | ${JUSTIFICATION:-Not provided} |

          ### Changes
          - Sets \`archived: true\` for \`${REPO_NAME}\` in \`data/repositories.yaml\`

          ### CI Checks
          - **Terraform CI** will run \`terraform plan\` automatically on this PR
          - Review the plan output in the PR comment before approving

          ### ⚠️ What happens after merge
          1. The **Terraform Apply** workflow triggers automatically (push to \`main\` on \`data/*.yaml\`)
          2. Terraform runs \`init\` → \`plan\` → \`apply\` against the \`dev\` environment
          3. The repository \`${ORG_NAME}/${REPO_NAME}\` becomes **read-only** on GitHub

          ### Review Checklist
          - [ ] Review the Terraform plan output (posted as PR comment by CI)
          - [ ] Verify the correct repository is being archived
          - [ ] Confirm business justification is valid
          - [ ] Ensure no active development depends on this repository

          ---
          > 🤖 *Automated by Archive Repo workflow*

          Closes #${ISSUE_NUMBER}
          EOF
          )

          # Create PR using gh CLI
          PR_URL=$(gh pr create \
            --base main \
            --head "${BRANCH_NAME}" \
            --title "feat: 🗃️ archive repository \`${REPO_NAME}\`" \
            --body "${PR_BODY}" \
            --label "archive" \
            --label "infrastructure") || {
            echo "::error::Failed to create PR"
            exit 1
          }

          # Extract PR number from URL (portable - works on all systems)
          PR_NUMBER=$(echo "$PR_URL" | sed 's|.*/pull/||' | tr -d '[:space:]')
          
          # Fallback: use gh CLI if extraction failed
          if [[ -z "$PR_NUMBER" || ! "$PR_NUMBER" =~ ^[0-9]+$ ]]; then
            PR_NUMBER=$(gh pr view "${BRANCH_NAME}" --json number --jq '.number')
          fi

          echo "pr-url=${PR_URL}" >> $GITHUB_OUTPUT
          echo "pr-number=${PR_NUMBER}" >> $GITHUB_OUTPUT
          echo "branch-name=${BRANCH_NAME}" >> $GITHUB_OUTPUT

          echo "✅ PR created successfully"
          echo "  URL: ${PR_URL}"
          echo "  Number: ${PR_NUMBER}"

      # -----------------------------------------------------------------------
      # Step 3: Comment on issue with PR link
      # -----------------------------------------------------------------------
      - name: Notify issue with PR link
        if: success()
        uses: actions/github-script@v7
        env:
          PR_URL: ${{ steps.create-pr.outputs.pr-url }}
          PR_NUMBER: ${{ steps.create-pr.outputs.pr-number }}
          BRANCH_NAME: ${{ steps.create-pr.outputs.branch-name }}
          REPO_NAME: ${{ needs.validate-request.outputs.repo-name }}
        with:
          github-token: ${{ secrets.ORG_GITHUB_TOKEN }}
          script: |
            try {
              const prUrl      = process.env.PR_URL;
              const prNumber   = process.env.PR_NUMBER;
              const branch     = process.env.BRANCH_NAME;
              const repoName   = process.env.REPO_NAME;
              const org        = context.repo.owner;
              const issueNumber = context.issue.number;

              if (!prUrl || !prNumber || !branch || !repoName) {
                console.error('Missing PR information:', { prUrl, prNumber, branch, repoName });
                core.setFailed(`Missing PR information for notification. Got: prUrl=${prUrl}, prNumber=${prNumber}, branch=${branch}, repoName=${repoName}`);
                return;
              }

              const body = [
                '## 🔄 Archive PR Created — Awaiting Review & Merge',
                '',
                '### 📋 Summary',
                '',
                '| Field | Value |',
                '|-------|-------|',
                `| **Pull Request** | [#${prNumber}](${prUrl}) |`,
                `| **Branch** | \`${branch}\` |`,
                `| **Repository** | \`${org}/${repoName}\` |`,
                `| **CI Status** | ✅ Terraform CI will run automatically on this PR |`,
                '',
                '### 📝 Next Steps',
                '',
                '1. **Terraform CI** will run `terraform plan` and post results as a PR comment',
                '2. A reviewer must **review the plan**, then **approve and merge** the PR',
                '3. Once merged, the **Terraform Apply** workflow runs automatically against `dev`',
                `4. This issue will be **closed automatically** when the PR merges`,
                '',
                '---',
                `*Archive request from issue #${issueNumber}*`,
              ].join('\n');

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body,
              });

              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                labels: ['archive-pr-created'],
              });

              console.log(`✅ Posted PR notification for issue #${issueNumber}: ${prUrl}`);
            } catch (error) {
              console.error('Error posting PR notification:', error);
              core.setFailed(`Failed to notify issue with PR link: ${error.message}`);
            }