name: "Archive Repo: Validate & Create PR"

on:
  repository_dispatch:
    types: [repo-archive]

permissions:
  issues: write
  contents: write
  pull-requests: write

concurrency:
  group: archive-${{ github.event.client_payload.issue_number }}
  cancel-in-progress: false

jobs:
  # ============================================================================
  # Job 1: Validate Archive Request
  # ============================================================================
  validate-request:
    name: Validate Archive Request
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      validation-passed: ${{ steps.validate.outputs.validation-passed }}
      repo-name: ${{ steps.parse.outputs.repo-name }}
      justification: ${{ steps.parse.outputs.justification }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ORG_GITHUB_TOKEN }}
          ref: main

      # -----------------------------------------------------------------------
      # Step 1: Parse issue body to extract fields
      # -----------------------------------------------------------------------
      - name: Parse issue form
        id: parse
        shell: bash
        env:
          ISSUE_BODY: ${{ github.event.client_payload.issue_body }}
        run: |
          # Extract a field value from a GitHub issue form body.
          # Fields follow the pattern: ### <Label>\n\n<value>\n\n### <Next Label>
          extract_field() {
            local label="$1"
            printf '%s\n' "$ISSUE_BODY" | awk -v label="### ${label}" '
              $0 == label { found=1; next }
              found && /^### /  { exit }
              found && NF > 0   { print }
            ' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//'
          }

          REPO_NAME=$(extract_field "Repository Name")
          JUSTIFICATION=$(extract_field "Business Justification")

          # Treat "_No response_" as empty
          [[ "$REPO_NAME"     == "_No response_" ]] && REPO_NAME=""
          [[ "$JUSTIFICATION" == "_No response_" ]] && JUSTIFICATION=""

          echo "repo-name=${REPO_NAME}" >> "$GITHUB_OUTPUT"

          echo "justification<<PARSEEOF" >> "$GITHUB_OUTPUT"
          echo "${JUSTIFICATION}" >> "$GITHUB_OUTPUT"
          echo "PARSEEOF" >> "$GITHUB_OUTPUT"

          echo "Parsed repo-name:     ${REPO_NAME}"
          echo "Parsed justification: ${JUSTIFICATION}"

      # -----------------------------------------------------------------------
      # Step 2: Validate repository and YAML config
      # -----------------------------------------------------------------------
      - name: Validate repository
        id: validate
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.ORG_GITHUB_TOKEN }}
          ORG_NAME: ${{ github.repository_owner }}
        run: |
          set -e  # Exit on any error

          REPO_NAME="${{ steps.parse.outputs.repo-name }}"
          JUSTIFICATION="${{ steps.parse.outputs.justification }}"
          VALIDATION_PASSED="false"
          VALIDATION_ERRORS=""
          VALIDATION_SUMMARY=""

          echo "🔍 Starting validation for archive request: ${REPO_NAME:-'(empty)'}"

          # --- Check required fields ---
          if [[ -z "$REPO_NAME" ]]; then
            VALIDATION_ERRORS="${VALIDATION_ERRORS}\n- ❌ Repository name is required"
            VALIDATION_SUMMARY="${VALIDATION_SUMMARY}| Repository Name | \`(empty)\` | ❌ Missing |\n"
            echo "❌ Repository name is empty"
          else
            VALIDATION_SUMMARY="${VALIDATION_SUMMARY}| Repository Name | \`${REPO_NAME}\` | ✅ Provided |\n"
            echo "✅ Repository name provided: ${REPO_NAME}"
            
            if [[ -z "$JUSTIFICATION" ]]; then
              VALIDATION_ERRORS="${VALIDATION_ERRORS}\n- ❌ Business justification is required"
              VALIDATION_SUMMARY="${VALIDATION_SUMMARY}| Business Justification | \`(empty)\` | ❌ Missing |\n"
              echo "❌ Business justification is empty"
            else
              VALIDATION_SUMMARY="${VALIDATION_SUMMARY}| Business Justification | \`${JUSTIFICATION:0:50}...\` | ✅ Provided |\n"
              echo "✅ Business justification provided"
            fi

            # --- Check if repository exists on GitHub ---
            echo "📡 Checking if repository exists on GitHub..."
            API_RESPONSE=$(gh api "repos/${ORG_NAME}/${REPO_NAME}" 2>/dev/null || true)
            API_EXIT_CODE=$?

            if [[ $API_EXIT_CODE -eq 0 && -n "$API_RESPONSE" ]]; then
              # Repo exists — check if archived
              IS_ARCHIVED=$(echo "$API_RESPONSE" | jq -r '.archived // "false"')
              VALIDATION_SUMMARY="${VALIDATION_SUMMARY}| Operation | Archive Repository | ✅ Specified |\n"
              VALIDATION_SUMMARY="${VALIDATION_SUMMARY}| Repository Exists | \`${ORG_NAME}/${REPO_NAME}\` | ✅ Found |\n"

              echo "🔍 Validating ARCHIVE operation..."
              if [[ "$IS_ARCHIVED" == "true" ]]; then
                VALIDATION_ERRORS="${VALIDATION_ERRORS}\n- ❌ Repository \`${REPO_NAME}\` is already archived"
                VALIDATION_SUMMARY="${VALIDATION_SUMMARY}| Repository Status | \`${ORG_NAME}/${REPO_NAME}\` | ❌ Already archived (cannot archive) |\n"
                echo "❌ Repository is already archived"
              else
                VALIDATION_SUMMARY="${VALIDATION_SUMMARY}| Repository Status | \`${ORG_NAME}/${REPO_NAME}\` | ✅ Active (ready to archive) |\n"
                echo "✅ Repository found and active (ready to archive)"

                # --- Check if repository exists in YAML config ---
                if [[ -f "data/repositories.yaml" ]]; then
                  echo "📋 Checking YAML configuration..."
                  if grep -qP "^\s+-?\s*name:\s+['\"]?${REPO_NAME}['\"]?\s*$" data/repositories.yaml; then
                    VALIDATION_SUMMARY="${VALIDATION_SUMMARY}| YAML Config | \`data/repositories.yaml\` | ✅ Found |\n"
                    echo "✅ Repository found in YAML config"

                    # Check if already archived in YAML
                    ALREADY_ARCHIVED=$(awk -v name="${REPO_NAME}" '
                      /name:.*'"${REPO_NAME}"'/ { found=1 }
                      found && /archived:[[:space:]]*true/ { print "true"; exit }
                      found && /^[[:space:]]*-[[:space:]]*name:/ && !/'"${REPO_NAME}"'/ { exit }
                    ' data/repositories.yaml)

                    if [[ "$ALREADY_ARCHIVED" == "true" ]]; then
                      VALIDATION_ERRORS="${VALIDATION_ERRORS}\n- ❌ Repository \`${REPO_NAME}\` is already set to \`archived: true\` in \`data/repositories.yaml\`"
                      VALIDATION_SUMMARY="${VALIDATION_SUMMARY}| YAML Archived Status | \`data/repositories.yaml\` | ❌ Already archived |\n"
                      echo "❌ Repository already marked as archived in YAML"
                    else
                      VALIDATION_PASSED="true"
                      VALIDATION_SUMMARY="${VALIDATION_SUMMARY}| YAML Archived Status | \`data/repositories.yaml\` | ✅ Not archived |\n"
                      echo "✅ Repository not yet archived in YAML"
                    fi
                  else
                    VALIDATION_ERRORS="${VALIDATION_ERRORS}\n- ❌ Repository \`${REPO_NAME}\` not found in \`data/repositories.yaml\`"
                    VALIDATION_SUMMARY="${VALIDATION_SUMMARY}| YAML Config | \`data/repositories.yaml\` | ❌ Not found |\n"
                    echo "❌ Repository not found in YAML config"
                  fi
                else
                  VALIDATION_ERRORS="${VALIDATION_ERRORS}\n- ⚠️ File \`data/repositories.yaml\` not found"
                  VALIDATION_SUMMARY="${VALIDATION_SUMMARY}| YAML Config | \`data/repositories.yaml\` | ⚠️ File missing |\n"
                  echo "⚠️ YAML config file not found"
                fi
              fi
            else
              # Repository not found or API error
              echo "❌ Repository not found or API error"
              VALIDATION_ERRORS="${VALIDATION_ERRORS}\n- ❌ Repository \`${ORG_NAME}/${REPO_NAME}\` not found on GitHub"
              VALIDATION_SUMMARY="${VALIDATION_SUMMARY}| Repository Exists | \`${ORG_NAME}/${REPO_NAME}\` | ❌ Not found |\n"
            fi
          fi


          # --- Build full summary ---
          FULL_SUMMARY="| Check | Detail | Result |\n|-------|--------|--------|\n${VALIDATION_SUMMARY}"
          if [[ -n "$VALIDATION_ERRORS" ]]; then
            FULL_SUMMARY="${FULL_SUMMARY}\n### Errors\n${VALIDATION_ERRORS}"
          fi

          # --- Set outputs (always set, even if empty) ---
          echo "validation-passed=${VALIDATION_PASSED}" >> $GITHUB_OUTPUT

          echo "validation-summary<<VSEOF" >> $GITHUB_OUTPUT
          echo -e "$FULL_SUMMARY" >> $GITHUB_OUTPUT
          echo "VSEOF" >> $GITHUB_OUTPUT

          echo "validation-errors<<VEEOF" >> $GITHUB_OUTPUT
          echo -e "$VALIDATION_ERRORS" >> $GITHUB_OUTPUT
          echo "VEEOF" >> $GITHUB_OUTPUT

          echo "✅ Validation complete. Passed: ${VALIDATION_PASSED}"

      # -----------------------------------------------------------------------
      # Step 3: Build validation details
      # -----------------------------------------------------------------------
      - name: Build validation details
        if: always()
        id: build-details
        shell: bash
        env:
          JUSTIFICATION: ${{ steps.parse.outputs.justification }}
          VALIDATION_TABLE: ${{ steps.validate.outputs.validation-summary }}
          VALIDATION_ERRORS: ${{ steps.validate.outputs.validation-errors }}
        run: |
          REPO_NAME="${{ steps.parse.outputs.repo-name }}"
          ORG_NAME="${{ github.repository_owner }}"
          JUSTIFICATION="${JUSTIFICATION}"
          VALIDATION_PASSED="${{ steps.validate.outputs.validation-passed }}"
          VALIDATION_TABLE="${VALIDATION_TABLE}"
          VALIDATION_ERRORS="${VALIDATION_ERRORS}"

          # --- Build summary-table JSON ---
          SUMMARY_TABLE=$(jq -nc \
            --arg repo "$REPO_NAME" \
            --arg org "$ORG_NAME" \
            --arg justification "${JUSTIFICATION:-_Not provided_}" \
            '[
              {field: "Repository Name", value: ("`" + $repo + "`")},
              {field: "Organization", value: ("`" + $org + "`")},
              {field: "Operation", value: "Archive Repository"},
              {field: "Business Justification", value: $justification}
            ]')

          # --- Build details-sections JSON ---
          IMPACT_WARNING="⚠️ **Archiving a repository will:**\n- Make the repository **read-only**\n- Disable push access, issues, pull requests, labels, milestones, projects, wiki, releases, commits, tags, branches, reactions, and comments\n- The repository will still be **visible** and **cloneable**\n- This action **can be reversed** by unarchiving the repository"
          IMPACT_HEADING="⚠️ Archive Impact"

          DETAILS_JSON=$(jq -nc \
            --arg validation "$VALIDATION_TABLE" \
            --arg warning "$IMPACT_WARNING" \
            --arg heading "$IMPACT_HEADING" \
            '[
              {heading: "🔍 Validation Results", body: $validation},
              {heading: $heading, body: $warning}
            ]')

          # --- Build next-steps ---
          if [[ "$VALIDATION_PASSED" == "true" ]]; then
            NEXT_STEPS="- A PR will be created to update \`data/repositories.yaml\` with \`archived: true\`
          - **Terraform CI** will automatically run \`terraform plan\` on the PR and post results as a comment
          - A reviewer must **review the plan**, then **approve and merge** the PR
          - Once merged, the **Terraform Apply** workflow runs automatically against the \`dev\` environment
          - The repository will become **read-only** on GitHub
          - This issue will be **closed automatically** when the PR merges"
          else
            NEXT_STEPS=""
          fi

          # --- Build error-details ---
          if [[ "$VALIDATION_PASSED" != "true" && -n "$VALIDATION_ERRORS" ]]; then
            ERROR_DETAILS="${VALIDATION_ERRORS}\n\nPlease fix the validation errors above and create a new archive request issue."
          else
            ERROR_DETAILS=""
          fi

          # --- Validate JSON ---
          for json_var in "$SUMMARY_TABLE" "$DETAILS_JSON"; do
            if ! echo "$json_var" | jq empty 2>/dev/null; then
              echo "::error::Failed to build valid JSON"
              exit 1
            fi
          done

          # --- Set outputs ---
          echo "summary-table<<STEOF" >> $GITHUB_OUTPUT
          echo "$SUMMARY_TABLE" >> $GITHUB_OUTPUT
          echo "STEOF" >> $GITHUB_OUTPUT

          echo "details-json<<DJEOF" >> $GITHUB_OUTPUT
          echo "$DETAILS_JSON" >> $GITHUB_OUTPUT
          echo "DJEOF" >> $GITHUB_OUTPUT

          echo "next-steps<<NSEOF" >> $GITHUB_OUTPUT
          echo -e "$NEXT_STEPS" >> $GITHUB_OUTPUT
          echo "NSEOF" >> $GITHUB_OUTPUT

          echo "error-details<<EDEOF" >> $GITHUB_OUTPUT
          echo -e "$ERROR_DETAILS" >> $GITHUB_OUTPUT
          echo "EDEOF" >> $GITHUB_OUTPUT

      # -----------------------------------------------------------------------
      # Step 4: Notify validation result on the issue
      # -----------------------------------------------------------------------
      - name: Notify validation result
        if: always()
        uses: actions/github-script@v7
        env:
          VALIDATION_PASSED: ${{ steps.validate.outputs.validation-passed }}
          SUMMARY_TABLE: ${{ steps.build-details.outputs.summary-table }}
          DETAILS_JSON: ${{ steps.build-details.outputs.details-json }}
          NEXT_STEPS: ${{ steps.build-details.outputs.next-steps }}
          ERROR_DETAILS: ${{ steps.build-details.outputs.error-details }}
        with:
          github-token: ${{ secrets.ORG_GITHUB_TOKEN }}
          script: |
            try {
              const passed = process.env.VALIDATION_PASSED === 'true';
              const summaryRows = JSON.parse(process.env.SUMMARY_TABLE || '[]');
              const detailSections = JSON.parse(process.env.DETAILS_JSON || '[]');
              const nextSteps = process.env.NEXT_STEPS || '';
              const errorDetails = process.env.ERROR_DETAILS || '';

              const title = passed
                ? '## ✅ Archive Request — Validation Passed'
                : '## ❌ Archive Request — Validation Failed';

              let body = `${title}\n\n`;

              // Summary table
              body += '### 📋 Request Summary\n\n';
              body += '| Field | Value |\n|-------|-------|\n';
              for (const row of summaryRows) {
                body += `| **${row.field}** | ${row.value} |\n`;
              }
              body += '\n';

              // Detail sections
              for (const section of detailSections) {
                body += `### ${section.heading}\n\n${section.body}\n\n`;
              }

              // Error details
              if (errorDetails) {
                body += `### ⚠️ Errors\n\n${errorDetails}\n\n`;
              }

              // Next steps
              if (nextSteps) {
                body += `### 📝 Next Steps\n\n${nextSteps}\n`;
              } else if (!passed) {
                body += '### 📝 Next Steps\n\nPlease fix the validation errors above and create a new archive request issue.\n';
              }

              // Post comment
              const issueNumber = context.payload.client_payload.issue_number;

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body,
              });

              // Add labels
              const label = passed ? 'archive-validation-passed' : 'archive-validation-failed';
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                labels: [label],
              });

              // Close issue on failure
              if (!passed) {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  state: 'closed',
                  state_reason: 'completed',
                });
              }
            } catch (error) {
              console.error('Error posting validation comment:', error);
              core.setFailed(`Failed to notify validation result: ${error.message}`);
            }

  # ============================================================================
  # Job 2: Create PR with YAML change
  # Runs only after validation passes. Updates data/repositories.yaml via yq,
  # opens a PR, and posts the PR link back to the issue.
  # On merge → triggers terraform-apply.yml automatically (data/*.yaml push).
  # ============================================================================
  create-archive-pr:
    name: 📝 Create PR - Archive Repository
    runs-on: ubuntu-latest
    needs: validate-request
    timeout-minutes: 20
    if: needs.validate-request.outputs.validation-passed == 'true'
    outputs:
      pr-number: ${{ steps.create-pr.outputs.pr-number }}
      pr-url: ${{ steps.create-pr.outputs.pr-url }}
      branch-name: ${{ steps.branch.outputs.branch-name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ORG_GITHUB_TOKEN }}
          ref: main

      # -----------------------------------------------------------------------
      # Step 1: Install yq
      # -----------------------------------------------------------------------
      - name: Install yq
        run: |
          YQ_VERSION="v4.44.1"
          wget -qO /usr/local/bin/yq \
            "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64"
          chmod +x /usr/local/bin/yq
          yq --version

      # -----------------------------------------------------------------------
      # Step 2: Setup git and branch (handle stale branches/PRs)
      # -----------------------------------------------------------------------
      - name: Setup git and branch
        id: branch
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.ORG_GITHUB_TOKEN }}
        run: |
          REPO_NAME="${{ needs.validate-request.outputs.repo-name }}"
          ISSUE_NUMBER="${{ github.event.client_payload.issue_number }}"
          BRANCH_NAME="archive/issue-${ISSUE_NUMBER}-${REPO_NAME}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Close any existing open PR for this branch and delete the remote branch
          EXISTING_PR=$(gh pr list \
            --head "${BRANCH_NAME}" --state open \
            --json number --jq '.[0].number' 2>/dev/null || true)
          if [[ -n "$EXISTING_PR" && "$EXISTING_PR" =~ ^[0-9]+$ ]]; then
            gh pr close "${EXISTING_PR}" \
              --comment "Superseded by re-run of archive workflow for issue #${ISSUE_NUMBER}" \
              2>/dev/null || true
          fi
          git fetch --prune
          git push origin --delete "${BRANCH_NAME}" 2>/dev/null || true

          git checkout -b "${BRANCH_NAME}"
          echo "branch-name=${BRANCH_NAME}" >> "$GITHUB_OUTPUT"
          echo "✅ Created branch: ${BRANCH_NAME}"

      # -----------------------------------------------------------------------
      # Step 3: Update repositories.yaml — set archived: true, disable security
      # -----------------------------------------------------------------------
      - name: Update repositories.yaml
        id: update-yaml
        shell: bash
        env:
          REPO_NAME: ${{ needs.validate-request.outputs.repo-name }}
        run: |
          YAML_FILE="data/repositories.yaml"

          # Set archived: true and disable all security alerts for the repo
          REPO_NAME="$REPO_NAME" yq -i '
            (.repositories[] | select(.name == strenv(REPO_NAME))).archived = true |
            (.repositories[] | select(.name == strenv(REPO_NAME))).security.enable_vulnerability_alerts = false |
            (.repositories[] | select(.name == strenv(REPO_NAME))).security.enable_advanced_security = false |
            (.repositories[] | select(.name == strenv(REPO_NAME))).security.enable_secret_scanning = false |
            (.repositories[] | select(.name == strenv(REPO_NAME))).security.enable_secret_scanning_push_protection = false |
            (.repositories[] | select(.name == strenv(REPO_NAME))).security.enable_dependabot_alerts = false |
            (.repositories[] | select(.name == strenv(REPO_NAME))).security.enable_dependabot_security_updates = false
          ' "$YAML_FILE"

          # Verify the change was applied (use yq JSON output — archived may be anywhere in the block)
          ARCHIVED=$(yq e -o=json --arg repo "$REPO_NAME" '.repositories[] | select(.name == $repo) | .archived' "$YAML_FILE" 2>/dev/null || true)
          # Normalize output (remove whitespace and any surrounding quotes)
          ARCHIVED=$(echo "$ARCHIVED" | tr -d '[:space:]"')
          if [[ "$ARCHIVED" != "true" ]]; then
            echo "::error::Verification failed — 'archived: true' not found for '${REPO_NAME}' (got: '${ARCHIVED}')"
            exit 1
          fi
          echo "✅ Updated ${YAML_FILE} — set archived: true and disabled security alerts"
          yq e --arg repo "$REPO_NAME" '.repositories[] | select(.name == $repo)' "$YAML_FILE"

      # -----------------------------------------------------------------------
      # Step 4: Commit and push
      # -----------------------------------------------------------------------
      - name: Commit and push
        shell: bash
        env:
          REPO_NAME: ${{ needs.validate-request.outputs.repo-name }}
          BRANCH_NAME: ${{ steps.branch.outputs.branch-name }}
          ISSUE_NUMBER: ${{ github.event.client_payload.issue_number }}
          ORG_NAME: ${{ github.repository_owner }}
          REQUESTER: ${{ github.event.client_payload.issue_user_login }}
        run: |
          YAML_FILE="data/repositories.yaml"

          git add "$YAML_FILE"

          if git diff --cached --quiet; then
            echo "::error::No changes staged — repository may already be archived in YAML"
            exit 1
          fi

          COMMIT_MSG=$'feat: \xf0\x9f\x97\x83\xef\xb8\x8f archive repository \''${REPO_NAME}$'\''\n\nSet archived: true for '${ORG_NAME}/${REPO_NAME}$' in data/repositories.yaml\n\n- Repository: '${ORG_NAME}/${REPO_NAME}$'\n- Operation: Archive\n- Requested by: @'${REQUESTER}$'\n- Issue: #'${ISSUE_NUMBER}$'\n\nRelated to #'${ISSUE_NUMBER}

          git commit -m "$COMMIT_MSG"
          git push origin "${BRANCH_NAME}"
          echo "✅ Pushed branch ${BRANCH_NAME}"

      # -----------------------------------------------------------------------
      # Step 5: Create pull request
      # -----------------------------------------------------------------------
      - name: Create pull request
        id: create-pr
        uses: actions/github-script@v7
        env:
          REPO_NAME: ${{ needs.validate-request.outputs.repo-name }}
          BRANCH_NAME: ${{ steps.branch.outputs.branch-name }}
          ISSUE_NUMBER: ${{ github.event.client_payload.issue_number }}
          JUSTIFICATION: ${{ needs.validate-request.outputs.justification }}
          REQUESTER: ${{ github.event.client_payload.issue_user_login }}
        with:
          github-token: ${{ secrets.ORG_GITHUB_TOKEN }}
          script: |
            const repoName    = process.env.REPO_NAME;
            const branch      = process.env.BRANCH_NAME;
            const issueNumber = parseInt(process.env.ISSUE_NUMBER, 10);
            const justification = process.env.JUSTIFICATION || '_Not provided_';
            const requester   = process.env.REQUESTER;
            const org         = context.repo.owner;

            const prTitle = `feat: \u{1F5C3}\uFE0F archive repository \`${repoName}\``;

            const prBody = [
              `## \u{1F5C3}\uFE0F Archive Repository: \`${repoName}\``,
              '',
              '### Summary',
              '',
              '| Field | Value |',
              '|-------|-------|',
              `| **Repository** | \`${org}/${repoName}\` |`,
              `| **Operation** | Archive |`,
              `| **Requested by** | @${requester} |`,
              `| **Justification** | ${justification} |`,
              '',
              '### Changes',
              `- Sets \`archived: true\` for \`${repoName}\` in \`data/repositories.yaml\``,
              '- Disables all security alerts (vulnerability alerts, secret scanning, Dependabot) before archiving',
              '',
              '### \u26A0\uFE0F Archive Impact',
              'Archiving a repository will:',
              '- Make the repository **read-only**',
              '- Disable push access, issues, pull requests, labels, milestones, projects, wiki, releases, commits, tags, branches, reactions, and comments',
              '- The repository will still be **visible** and **cloneable**',
              '- This action **can be reversed** by unarchiving the repository',
              '',
              '### CI Checks',
              '- **Terraform CI** will run `terraform plan` automatically on this PR',
              '- Review the plan output in the PR comment before approving',
              '',
              '### \u26A0\uFE0F What happens after merge',
              '1. The **Terraform Apply** workflow triggers automatically (push to `main` on `data/*.yaml`)',
              '2. Terraform runs `init` \u2192 `plan` \u2192 `apply` against the `dev` environment',
              `3. The repository \`${org}/${repoName}\` becomes **read-only** on GitHub`,
              '',
              '### Review Checklist',
              '- [ ] Review the Terraform plan output (posted as PR comment by CI)',
              '- [ ] Verify the correct repository is being archived',
              '- [ ] Confirm business justification is valid',
              '- [ ] Ensure no active development depends on this repository',
              '',
              '---',
              '> \u{1F916} *Automated by Archive Repo workflow*',
              '',
              `Closes #${issueNumber}`,
            ].join('\n');

            // Ensure labels exist
            for (const [name, color, desc] of [
              ['archive',   '0075ca', 'Repository archive request'],
              ['automated', 'e4e669', 'Automated PR'],
            ]) {
              await github.rest.issues.createLabel({
                owner: context.repo.owner, repo: context.repo.repo,
                name, color, description: desc,
              }).catch(() => {});  // ignore if already exists
            }

            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              head:  branch,
              base:  'main',
              title: prTitle,
              body:  prBody,
            });

            await github.rest.issues.addLabels({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: pr.number,
              labels: ['archive', 'automated'],
            });

            core.setOutput('pr-number', String(pr.number));
            core.setOutput('pr-url',    pr.html_url);
            console.log(`✅ PR #${pr.number} created: ${pr.html_url}`);

      # -----------------------------------------------------------------------
      # Step 6: Post PR link back to the issue
      # -----------------------------------------------------------------------
      - name: Post PR link to issue
        if: success()
        uses: actions/github-script@v7
        env:
          PR_URL:       ${{ steps.create-pr.outputs.pr-url }}
          PR_NUMBER:    ${{ steps.create-pr.outputs.pr-number }}
          BRANCH_NAME:  ${{ steps.branch.outputs.branch-name }}
          REPO_NAME:    ${{ needs.validate-request.outputs.repo-name }}
          ISSUE_NUMBER: ${{ github.event.client_payload.issue_number }}
        with:
          github-token: ${{ secrets.ORG_GITHUB_TOKEN }}
          script: |
            const prUrl       = process.env.PR_URL;
            const prNumber    = process.env.PR_NUMBER;
            const branch      = process.env.BRANCH_NAME;
            const repoName    = process.env.REPO_NAME;
            const org         = context.repo.owner;
            const issueNumber = parseInt(process.env.ISSUE_NUMBER, 10);

            const body = [
              '## \u{1F504} Archive PR Created \u2014 Awaiting Review & Merge',
              '',
              '| Field | Value |',
              '|-------|-------|',
              `| **Pull Request** | [#${prNumber}](${prUrl}) |`,
              `| **Repository** | \`${org}/${repoName}\` |`,
              `| **Branch** | \`${branch}\` |`,
              `| **CI Status** | \u2705 Terraform CI will run automatically on this PR |`,
              '',
              '### \u{1F4DD} Next Steps',
              '',
              '1. **Terraform CI** will run `terraform plan` and post results as a PR comment',
              '2. A reviewer must **review the plan**, then **approve and merge** the PR',
              '3. Once merged, **Terraform Apply** triggers automatically against the `dev` environment',
              '4. This issue will be **closed automatically** when the PR merges',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: issueNumber,
              body,
            });

            await github.rest.issues.addLabels({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: issueNumber,
              labels: ['archive-pr-created'],
            });

            console.log(`\u2705 Posted PR notification for issue #${issueNumber}: ${prUrl}`);
