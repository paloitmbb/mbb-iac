name: "Issue Dispatcher"

# Lightweight dispatcher that routes issue-based requests to the correct workflow
# via repository_dispatch. This prevents ALL issue-triggered workflows from running
# on every new issue — only the matching workflow will be triggered.

on:
  issues:
    types: [opened]

permissions:
  contents: write   # required for createDispatchEvent (repository_dispatch)
  issues: read

jobs:
  dispatch:
    name: "Route Issue to Workflow"
    # runs-on: [self-hosted, maybank-ghes-runners]
    runs-on: ubuntu-latest
    steps:
      - name: Determine issue type and dispatch
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ORG_GITHUB_TOKEN }}
          script: |
            const title = context.payload.issue.title;
            const issueNumber = context.payload.issue.number;
            const issueBody = context.payload.issue.body || '';

            // ── Routing table ──
           
            const routes = [
              { prefix: '[GHES Migration]', eventType: 'ghes-migration' },
              { prefix: '[REPO ARCHIVE]',   eventType: 'repo-archive'    }
            ];

            let matched = false;

            for (const route of routes) {
              if (title.startsWith(route.prefix)) {
                console.log(`✅ Matched: "${route.prefix}" → dispatching "${route.eventType}"`);

                await github.rest.repos.createDispatchEvent({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  event_type: route.eventType,
                  client_payload: {
                    issue_number: issueNumber,
                    issue_title: title,
                    issue_body: issueBody,
                    issue_user_login: context.payload.issue.user.login
                  }
                });

                matched = true;
                break;
              }
            }

            if (!matched) {
              console.log(`ℹ️ No route matched for issue title: "${title}"`);
              console.log('   This issue will not trigger any dispatched workflow.');
            }
