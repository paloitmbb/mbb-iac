name: Terraform Apply - Infrastructure

on:
  push:
    branches:
      - main
    paths:
      - "environments/**/*.tfvars"
      - "data/*.yaml"
      - "data/*.yml"
      - "data/**/*.yaml"
      - "data/**/*.yml"
      - "modules/**/*.tf"
      - "*.tf"
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to apply"
        required: true
        type: choice
        options:
          - dev
          - production

permissions:
  contents: write
  issues: write
  actions: write
  id-token: write  # Required for OIDC authentication with Azure

jobs:
  # Detect whether data/repositories.yaml was changed in this push.
  # git diff HEAD~1 HEAD is reliable even for merge commits (unlike
  # github.event.head_commit.modified which is empty for merge commits).
  check-repos-yaml:
    name: 🔍 Check - repositories.yaml changed
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    outputs:
      changed: ${{ steps.check.outputs.changed }}
      repos-added: ${{ steps.check.outputs.repos-added }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - id: check
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q 'data/repositories.yaml'; then
            echo "changed=true" >> $GITHUB_OUTPUT
            # Only true when lines with '- name:' were ADDED (not deleted/archived)
            if git diff HEAD~1 HEAD -- data/repositories.yaml | grep -q '^+.*- name:'; then
              echo "repos-added=true" >> $GITHUB_OUTPUT
            else
              echo "repos-added=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "repos-added=false" >> $GITHUB_OUTPUT
          fi

  terraform-apply:
    name: 🚀 Apply - Infrastructure Changes
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: ${{ github.event_name == 'workflow_dispatch' && fromJSON(format('["{0}"]', inputs.environment)) || fromJSON('["dev"]') }}

    environment:
      name: ${{ matrix.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.5
          terraform_wrapper: false

      - name: Terraform Init
        run: |
          terraform init -backend-config=environments/${{ matrix.environment }}/backend.tfvars
        env:
          GITHUB_TOKEN: ${{ secrets.ORG_GITHUB_TOKEN }}
          # Azure authentication via OIDC (azure/login@v2 handles token)
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_USE_OIDC: true

      - name: Clean up security state for archived repos
        run: |
          # When a repo transitions to archived: true, its github_security module instance
          # is removed from for_each. Terraform would then plan a DESTROY → DELETE call
          # on github_repository_dependabot_security_updates, which the GitHub API rejects
          # with 422 when an org-enforced security configuration is active.
          # Removing the module from state before plan prevents any API call being made.
          echo "🔍 Checking for orphaned security module instances..."
          STATE_LIST=$(terraform state list 2>/dev/null || echo "")
          CLEANED=0
          SEEN_KEYS=""

          
          for item in $STATE_LIST; do
            repo_key=$(echo "$item" | sed -n 's/^module\.github_security\["\([^"]*\)"\].*/\1/p')
            [ -z "$repo_key" ] && continue

            # Deduplicate — multiple resources share the same module instance key
            if echo "$SEEN_KEYS" | grep -qF "|${repo_key}|" 2>/dev/null; then
              continue
            fi
            SEEN_KEYS="${SEEN_KEYS}|${repo_key}|"

            is_archived=$(python3 -c "
          import yaml, sys
          with open('data/repositories.yaml') as f:
              data = yaml.safe_load(f)
          for repo in data.get('repositories', []):
              if repo['name'] == sys.argv[1] and repo.get('archived', False):
                  print('true')
                  sys.exit(0)
          print('false')
          " "$repo_key" 2>/dev/null || echo "false")

            if [ "$is_archived" = "true" ]; then
              echo "🗑️  Removing security state for archived repo: $repo_key"
              terraform state rm "module.github_security[\"$repo_key\"]" || true
              CLEANED=$((CLEANED + 1))
            fi
          done

          if [ "$CLEANED" -gt 0 ]; then
            echo "✅ Cleaned $CLEANED orphaned security module instance(s)"
          else
            echo "✅ No orphaned security state found"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.ORG_GITHUB_TOKEN }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_USE_OIDC: true

      - name: Terraform Plan
        run: |
          terraform plan -var-file=environments/${{ matrix.environment }}/terraform.tfvars -out=environments/${{ matrix.environment }}/tfplan
        env:
          GITHUB_TOKEN: ${{ secrets.ORG_GITHUB_TOKEN }}
          # Azure authentication via OIDC (azure/login@v2 handles token)
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_USE_OIDC: true

      - name: Terraform Apply
        run: |
          terraform apply -auto-approve environments/${{ matrix.environment }}/tfplan
        env:
          GITHUB_TOKEN: ${{ secrets.ORG_GITHUB_TOKEN }}
          # Azure authentication via OIDC (azure/login@v2 handles token)
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_USE_OIDC: true

  # ============================================================================
  # Job 2: Seed newly created repositories with tech-stack template
  # Runs once after all terraform-apply matrix jobs succeed.
  # Detects repos added to data/repositories.yaml in this push, maps their
  # topics to a stack folder in paloitmbb/mbb-repo-templates/stacks/, and
  # pushes that folder's content as the initial commit to the new repo.
  # Skips for archive repository commits (handled by terraform-apply-archive.yml)
  # ============================================================================
  seed-repository-template:
    name: 🌱 Seed - Bootstrap Repository Template
    runs-on: ubuntu-latest
    needs: [terraform-apply, check-repos-yaml]
    if: >-
      needs.terraform-apply.result == 'success' &&
      (github.event_name == 'workflow_dispatch' ||
      needs.check-repos-yaml.outputs.repos-added == 'true')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Need previous commit to diff repositories.yaml

      - name: Detect newly added repositories and resolve tech stacks
        id: detect
        shell: bash
        run: |
          pip install pyyaml --quiet

          python3 - << 'PYEOF'
          import subprocess, yaml, json, os

          # Find repo names that were added in this commit
          diff = subprocess.check_output(
              ['git', 'diff', 'HEAD~1', 'HEAD', '--', 'data/repositories.yaml'],
              text=True
          )

          added_names = set()
          for line in diff.splitlines():
              if line.startswith('+') and '- name:' in line:
                  name = line.split('- name:')[1].strip()
                  added_names.add(name)

          if not added_names:
              print('ℹ️  No new repositories detected in this commit')
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write('has-new-repos=false\n')
                  f.write('repos-json=[]\n')
              exit(0)

          print(f'Newly added repos: {sorted(added_names)}')

          with open('data/repositories.yaml') as f:
              data = yaml.safe_load(f)

          # Supported stack folder names in mbb-repo-templates/stacks/
          KNOWN_STACKS = ['python', 'react', 'nodejs', 'java-springboot']

          result = []
          for repo in data.get('repositories', []):
              if repo['name'] not in added_names:
                  continue
              topics = repo.get('topics', [])
              stack = next((t for t in topics if t in KNOWN_STACKS), None)
              if stack:
                  result.append({
                      'name': repo['name'],
                      'stack': stack,
                      'default_branch': repo.get('default_branch', 'main'),
                  })
                  print(f"  → {repo['name']} : stack={stack}")
              else:
                  print(f"  ⚠️  {repo['name']}: no known stack in topics {topics} — skipping seed")

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'has-new-repos={"true" if result else "false"}\n')
              f.write(f'repos-json={json.dumps(result)}\n')
          PYEOF

      - name: Clone template repository
        if: steps.detect.outputs.has-new-repos == 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/mbb-repo-templates
          token: ${{ secrets.ORG_GITHUB_TOKEN }}
          path: mbb-repo-templates

      - name: Push template stack to each new repository
        if: steps.detect.outputs.has-new-repos == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.ORG_GITHUB_TOKEN }}
          ORG: ${{ github.repository_owner }}
          REPOS_JSON: ${{ steps.detect.outputs.repos-json }}
        run: |
          echo "$REPOS_JSON" | jq -c '.[]' | while read -r repo; do
            NAME=$(echo "$repo" | jq -r '.name')
            STACK=$(echo "$repo" | jq -r '.stack')
            BRANCH=$(echo "$repo" | jq -r '.default_branch')
            STACK_PATH="mbb-repo-templates/stacks/$STACK"

            if [[ ! -d "$STACK_PATH" ]]; then
              echo "⚠️  Stack folder '$STACK_PATH' not found in mbb-repo-templates — skipping $NAME"
              echo "  Available stacks: $(ls mbb-repo-templates/stacks/ 2>/dev/null | tr '\n' ' ')"
              continue
            fi

            SEED_DIR="seed-$NAME"
            cp -r "$STACK_PATH" "$SEED_DIR"

            (
              cd "$SEED_DIR"
              git init
              git config user.name  "github-actions[bot]"
              git config user.email "github-actions[bot]@users.noreply.github.com"
              git add -A
              git commit -m "feat: 🌱 bootstrap repository from ${STACK} template"
              git branch -M "$BRANCH"
              git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${ORG}/${NAME}.git"
              git push -u origin "$BRANCH"
            ) && echo "✅ Seeded $NAME with $STACK template" \
              || echo "❌ Failed to seed $NAME — check logs above"
          done
