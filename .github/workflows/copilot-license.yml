name: "Copilot License: Validate & Execute"

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  # ============================================================================
  # Job 1: Validate Copilot License Request
  # ============================================================================
  validate-request:
    name: Validate Copilot License Request
    runs-on: ubuntu-latest
    if: startsWith(github.event.issue.title, '[COPILOT LICENSE]')
    outputs:
      validation-passed: ${{ steps.validate.outputs.validation-passed }}
      action: ${{ steps.parse.outputs.action }}
      github-username: ${{ steps.parse.outputs.github-username }}
      justification: ${{ steps.parse.outputs.justification }}

    steps:
      - name: Parse issue form
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const issueBody = context.payload.issue.body;

            function extractField(body, fieldLabel) {
              const regex = new RegExp(`### ${fieldLabel}\\s*[\\r\\n]+\\s*([^\\r\\n#]+?)\\s*(?=[\\r\\n]|$)`, 'i');
              const match = body.match(regex);
              return match ? match[1].trim() : '';
            }

            const action = extractField(issueBody, 'Action');
            const githubUsername = extractField(issueBody, 'GitHub Username');
            const justification = extractField(issueBody, 'Business Justification');

            core.setOutput('action', action);
            core.setOutput('github-username', githubUsername);
            core.setOutput('justification', justification);

            console.log(`Action: ${action}`);
            console.log(`GitHub Username: ${githubUsername}`);
            console.log(`Justification: ${justification}`);

      # -----------------------------------------------------------------------
      # Step 2: Validate user and current Copilot seat status
      # -----------------------------------------------------------------------
      - name: Validate request
        id: validate
        if: steps.duplicate-check.outputs.is-duplicate != 'true'
        uses: actions/github-script@v7
        env:
         ACTION: ${{ steps.parse.outputs.action }}
         USERNAME: ${{ steps.parse.outputs.github-username }}
         JUSTIFICATION: ${{ steps.parse.outputs.justification }}
        with:
          github-token: ${{ secrets.ORG_GITHUB_TOKEN }}
          script: |
            const org = context.repo.owner;
            const action = process.env.ACTION;
            const username = process.env.USERNAME;
            const justification = process.env.JUSTIFICATION;
            const errors = [];
            const validations = [];

            // --- Validate action ---
            if (!['assign', 'revoke'].includes(action)) {
              errors.push(`Invalid action: "${action}". Must be "assign" or "revoke".`);
            } else {
              validations.push({ check: 'Action is valid', result: '✅ Passed' });
            }

            // --- NEW: Validate justification is provided ---
            if (!justification || justification === '_No response_') {
              errors.push('Business justification is required');
              validations.push({ check: 'Justification provided', result: '❌ Missing' });
            } else if (justification.length < 10) {
              errors.push(
                'Business justification is too short. ' +
                'Please provide at least 10 characters explaining the business need.'
              );
              validations.push({ check: 'Justification provided', result: '❌ Too short' });
            } else if (justification.length > 500) {
              errors.push(
                'Business justification is too long. ' +
                'Please keep it under 500 characters.'
              );
              validations.push({ check: 'Justification provided', result: '❌ Too long' });
            } else {
              validations.push({ check: 'Justification provided', result: '✅ Passed' });
            }

            // --- Validate username is provided ---
            if (!username || username === '_No response_') {
              errors.push('GitHub username is required');
            } else {
              validations.push({ check: 'Username provided', result: '✅ Passed' });

              // --- NEW: Validate username format before any API call ---
              const USERNAME_REGEX = /^[a-zA-Z0-9]([a-zA-Z0-9-]{0,37}[a-zA-Z0-9])?$/;
              if (!USERNAME_REGEX.test(username)) {
                errors.push(
                  `Invalid GitHub username format: "${username}". ` +
                  'Usernames may only contain alphanumeric characters or hyphens, ' +
                  'and cannot start or end with a hyphen.'
                );
                validations.push({ check: 'Username format is valid', result: '❌ Invalid format' });
              } else {
                validations.push({ check: 'Username format is valid', result: '✅ Passed' });

              // --- Check user exists on GitHub ---
              try {
                await github.rest.users.getByUsername({ username });
                validations.push({ check: `User "${username}" exists`, result: '✅ Passed' });
              } catch (e) {
                errors.push(`User "${username}" does not exist on GitHub`);
                validations.push({ check: `User "${username}" exists`, result: '❌ Not found' });
              }

              // --- Check org membership ---
              try {
                await github.rest.orgs.checkMembershipForUser({ org, username });
                validations.push({ check: `User "${username}" is org member`, result: '✅ Passed' });
              } catch (e) {
                errors.push(`User "${username}" is not a member of the organization`);
                validations.push({ check: `User "${username}" is org member`, result: '❌ Not a member' });
              }
            }
            

            // --- Output results ---
            const passed = errors.length === 0;
            core.setOutput('validation-passed', passed.toString());
            core.setOutput('errors', JSON.stringify(errors));
            core.setOutput('validations', JSON.stringify(validations));

            console.log(`Validation ${passed ? 'PASSED' : 'FAILED'} - ${errors.length} error(s)`);

      # -----------------------------------------------------------------------
      # Step 3: Post validation result on issue
      # -----------------------------------------------------------------------
      - name: Post validation summary to issue
        if: success() || failure()
        uses: actions/github-script@v7
        env:
          VALIDATION_PASSED: ${{ steps.validate.outputs.validation-passed }}
          ERRORS_JSON: ${{ steps.validate.outputs.errors }}
          VALIDATIONS_JSON: ${{ steps.validate.outputs.validations }}
          ACTION: ${{ steps.parse.outputs.action }}
          USERNAME: ${{ steps.parse.outputs.github-username }}
          JUSTIFICATION: ${{ steps.parse.outputs.justification }}
        with:
          github-token: ${{ secrets.ORG_GITHUB_TOKEN }}
          script: |
            const passed = process.env.VALIDATION_PASSED === 'true';
            const errors = JSON.parse(process.env.ERRORS_JSON || '[]');
            const validations = JSON.parse(process.env.VALIDATIONS_JSON || '[]');

            const action = process.env.ACTION;
            const username = process.env.USERNAME;
            const justification = process.env.JUSTIFICATION;

            let comment = passed
              ? '## ✅ Validation Passed\n\n'
              : '## ❌ Validation Failed\n\n';

            comment += '### 📋 Request Summary\n\n';
            comment += '| Field | Value |\n';
            comment += '|-------|-------|\n';
            comment += `| **Action** | ${action} |\n`;
            comment += `| **GitHub Username** | \`${username}\` |\n`;
            comment += `| **Justification** | ${justification || '_Not provided_'} |\n`;
            comment += `| **Requested By** | @${context.payload.issue.user.login} |\n\n`;

            comment += '### 🔍 Validation Results\n\n';
            comment += '| Check | Result |\n';
            comment += '|-------|--------|\n';
            for (const v of validations) {
              comment += `| ${v.check} | ${v.result} |\n`;
            }
            comment += '\n';

            if (errors.length > 0) {
              comment += '### ⚠️ Errors\n\n';
              for (const e of errors) {
                comment += `- ❌ ${e}\n`;
              }
              comment += '\n';
            }

            if (passed) {
              comment += '### 📝 Next Steps\n\n';
              comment += '- ⏳ Awaiting approval from **DevSecOps team**\n';
              comment += '- Once approved, the Copilot license will be updated automatically\n';
            } else {
              comment += '### 📝 Next Steps\n\n';
              comment += '- Please fix the validation errors and create a new request issue.\n';
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment,
            });

            const labels = passed
              ? ['copilot', 'validation-passed']
              : ['copilot', 'validation-failed'];
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels,
            });

            if (!passed) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                state: 'closed',
                state_reason: 'not_planned',
              });
            }

  # ============================================================================
  # Job 2: Execute Copilot License Change (Requires Approval)
  # ============================================================================
  execute-request:
    name: Execute Copilot License Change
    runs-on: ubuntu-latest
    needs: validate-request
    if: needs.validate-request.outputs.validation-passed == 'true'
    environment: copilot-license-approval
    timeout-minutes: 1440

    steps:
      - name: Execute Copilot license change
        id: execute
        env:
          ACTION: ${{ needs.validate-request.outputs.action }}
          USERNAME: ${{ needs.validate-request.outputs.github-username }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ORG_GITHUB_TOKEN }}
          script: |
            const org = context.repo.owner;
            const action = process.env.ACTION;
            const username = process.env.USERNAME;
            let result = {};

            // --- NEW: Check current Copilot seat status before acting ---
            const { data: seat } = await github.request(
            'GET /orgs/{org}/members/{username}/copilot', 
            {org, username}
            ).catch(() => ({ data: null }));
  
            // --- NEW: Prevent duplicate assign ---
            if (action === 'assign' && seat?.copilot_enabled) {
            throw new Error(`User ${username} already has a Copilot seat`);
            }

            if (action === 'revoke' && !seat?.copilot_enabled) {
              throw new Error(`User ${username} does not have a Copilot seat to revoke`);
            }
            // --- Helper: translate API errors into clear messages ---
            function handleApiError(e, action, username) {
              if (e.status === 403) {
                throw new Error(
                  `Permission denied: The token does not have sufficient permissions ` +
                  `to ${action} Copilot seats. ` +
                  `Ensure ORG_GITHUB_TOKEN has the "manage_billing:copilot" scope.`
                );
              }
              if (e.status === 404) {
                throw new Error(
                  `Not found: GitHub Copilot billing is not enabled for this organisation, ` +
                  `or user \`${username}\` was not found.`
                );
              }
              if (e.status === 422) {
                throw new Error(
                  `Unprocessable request: The seat ${action} for \`${username}\` ` +
                  `was rejected by GitHub. The user may already be in the requested state.`
                );
              }
              if (e.status === 429) {
                throw new Error(
                  `Rate limit exceeded: Too many requests to the GitHub API. ` +
                  `Please wait a few minutes and re-submit the request.`
                );
              }
              if (e.status >= 500) {
                throw new Error(
                  `GitHub API server error (${e.status}): GitHub may be experiencing issues. ` +
                  `Check https://githubstatus.com and retry the request.`
                );
              }
              // unknown error — re-throw original
              throw new Error(`Unexpected error during ${action}: ${e.message}`);
            }

            if (action === 'assign') {
            try {
              await github.request('POST /orgs/{org}/copilot/billing/selected_users', {
                org,
                selected_usernames: [username],
              });
              result = {
                action: 'Copilot license assigned',
                details: `GitHub Copilot license has been **assigned** to \`${username}\``,
              };
            } catch (e) {
              handleApiError(e, 'assign', username);  // ← actually call the helper
            }
            } else if (action === 'revoke') {
            try {
              await github.request('DELETE /orgs/{org}/copilot/billing/selected_users', {
                org,
                selected_usernames: [username],
              });
              result = {
                action: 'Copilot license revoked',
                details: `GitHub Copilot license has been **revoked** from \`${username}\``,
              };
            } catch (e) {
              handleApiError(e, 'revoke', username);  // ← actually call the helper
            }
            } else {
              throw new Error(`Unknown action: ${action}`);  // ← also add this guard back
            }

            core.setOutput('action', result.action);
            core.setOutput('details', result.details);
            console.log(`✅ ${result.action}: ${result.details}`);

      # -----------------------------------------------------------------------
      # Step 2: Post execution result on issue
      # -----------------------------------------------------------------------
      - name: Post execution summary to issue
        if: success() || failure()
        uses: actions/github-script@v7
        env:
          EXECUTE_OUTCOME: ${{ steps.execute.outcome }}
          EXECUTE_ACTION: ${{ steps.execute.outputs.action }}
          EXECUTE_DETAILS: ${{ steps.execute.outputs.details }}
        with:
          github-token: ${{ secrets.ORG_GITHUB_TOKEN }}
          script: |
            const success = process.env.EXECUTE_OUTCOME === 'success';
            const action = process.env.EXECUTE_ACTION || 'Unknown action';
            const details = process.env.EXECUTE_DETAILS || 'No details available';

            let comment = success
              ? '## ✅ Request Executed Successfully\n\n'
              : '## ❌ Request Execution Failed\n\n';

            comment += '### 📋 Execution Summary\n\n';
            comment += '| Field | Value |\n';
            comment += '|-------|-------|\n';
            comment += `| **Action** | ${action} |\n`;
            comment += `| **Details** | ${details} |\n`;
            comment += `| **Executed By** | Automated Workflow |\n`;
            comment += `| **Approved By** | DevSecOps Team |\n\n`;

            if (!success) {
              const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
              comment += `### 🔧 Troubleshooting\n\n`;
              comment += `- [View Workflow Logs](${runUrl})\n`;
              comment += `- Contact DevSecOps team for assistance\n`;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment,
            });

            if (success) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                state: 'closed',
                state_reason: 'completed',
              });
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: ['completed'],
              });
            } else {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: ['execution-failed'],
              });
            }
