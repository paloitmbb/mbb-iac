name: "State Migration: 3 - Push & Verify"

# =============================================================================
# Step 3 of 3: Push split state files to new backends and verify with plans.
#
# This workflow:
#   1. Downloads the split .tfstate artifacts from step 2
#   2. Inits the global/ backend and pushes global.tfstate
#   3. Inits the shards/ backend(s) and pushes shard-*.tfstate
#   4. Runs terraform plan on each — expects ZERO changes
#   5. Fails the job if any plan detects drift
#
# ⚠️  This workflow MODIFIES REMOTE STATE. It is irreversible.
#     Ensure you have reviewed the step 2 artifacts before proceeding.
#     The monolithic state blob is NOT deleted — it remains as a fallback.
#
# Recovery: if this workflow fails after pushing state, use the monolithic
# state blob (github.terraform.tfstate) and re-initialise the root config.
# =============================================================================

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - production
        default: dev
      execute-run-id:
        description: "Run ID from 'State Migration: 2 - Execute Split' (required)"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: state-migration-${{ github.ref }}
  cancel-in-progress: false

jobs:
  push-and-verify:
    name: "🚀 Push states and verify plans"
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ vars.TERRAFORM_VERSION || '1.14.5' }}
          terraform_wrapper: false

      - name: Install Python dependencies
        run: pip install pyyaml --quiet

      - name: Download split state artifacts
        uses: actions/download-artifact@v4
        with:
          name: split-states-${{ inputs.environment }}-${{ inputs.execute-run-id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify artifact contents
        run: |
          echo "Downloaded state files:"
          ls -lh *.tfstate 2>/dev/null || { echo "❌ No .tfstate files found"; exit 1; }

      # ── Global ────────────────────────────────────────────────────────────

      - name: Init global backend
        working-directory: global/
        run: |
          terraform init \
            -backend-config="../environments/${{ inputs.environment }}/backend.tfvars" \
            -backend-config="key=github-global.terraform.tfstate"
        env:
          GITHUB_TOKEN: ${{ secrets.ORG_GITHUB_TOKEN }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: true

      - name: Push global state
        working-directory: global/
        run: terraform state push ../global.tfstate
        env:
          GITHUB_TOKEN: ${{ secrets.ORG_GITHUB_TOKEN }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: true

      - name: Verify global — expect no changes
        working-directory: global/
        run: |
          set +e
          terraform plan \
            -var-file="../environments/${{ inputs.environment }}/terraform.tfvars" \
            -detailed-exitcode \
            -lock=false \
            2>&1 | tee /tmp/global-plan.txt
          EXIT=${PIPESTATUS[0]}
          set -e
          if [ "$EXIT" -eq 1 ]; then
            echo "❌ terraform plan errored — see above"
            exit 1
          elif [ "$EXIT" -eq 2 ]; then
            echo "❌ Global plan shows unexpected changes — state push may be incomplete"
            echo "   Review /tmp/global-plan.txt and compare against the monolithic backup"
            exit 1
          fi
          echo "✅ Global plan: no changes"
          echo "GLOBAL_PLAN=clean" >> "$GITHUB_ENV"
        env:
          GITHUB_TOKEN: ${{ secrets.ORG_GITHUB_TOKEN }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: true

      # ── Shards ────────────────────────────────────────────────────────────

      - name: Discover shard state files
        id: shards
        run: |
          FILES=$(ls shard-repositories*.tfstate 2>/dev/null | sed 's/^shard-//' | sed 's/\.tfstate$//' | tr '\n' ',')
          FILES="${FILES%,}"
          echo "Found shard files: $FILES"
          echo "files=$FILES" >> "$GITHUB_OUTPUT"

      - name: Push and verify each shard
        run: |
          set -euo pipefail
          ORG_NAME=$(python3 -c "
          import re
          with open('environments/${{ inputs.environment }}/terraform.tfvars') as f:
              m = re.search(r'name\s*=\s*\"([^\"]+)\"', f.read())
              print(m.group(1) if m else 'unknown')
          ")

          ALL_CLEAN=true

          for REPOS_YAML_BASE in $(ls shard-repositories*.tfstate 2>/dev/null | sed 's/^shard-//' | sed 's/\.tfstate$//'); do
            REPOS_FILE="${REPOS_YAML_BASE}.yaml"
            STATE_KEY="github-repos-${REPOS_YAML_BASE}.terraform.tfstate"
            STATE_FILE="shard-${REPOS_YAML_BASE}.tfstate"

            echo ""
            echo "══════════════════════════════════════════════════"
            echo "  Shard: $REPOS_FILE"
            echo "  State key: $STATE_KEY"
            echo "══════════════════════════════════════════════════"

            cd shards/

            terraform init \
              -reconfigure \
              -backend-config="../environments/${{ inputs.environment }}/backend.tfvars" \
              -backend-config="key=${STATE_KEY}"

            terraform state push "../${STATE_FILE}"
            echo "✅ Pushed ${STATE_FILE} → ${STATE_KEY}"

            set +e
            terraform plan \
              -var="repositories_file=${REPOS_FILE}" \
              -var="organization_name=${ORG_NAME}" \
              -detailed-exitcode \
              -lock=false \
              2>&1 | tee "/tmp/shard-${REPOS_YAML_BASE}-plan.txt"
            EXIT=${PIPESTATUS[0]}
            set -e

            cd ..

            if [ "$EXIT" -eq 1 ]; then
              echo "❌ terraform plan errored for $REPOS_FILE"
              ALL_CLEAN=false
            elif [ "$EXIT" -eq 2 ]; then
              echo "❌ Shard plan for $REPOS_FILE shows unexpected changes"
              ALL_CLEAN=false
            else
              echo "✅ Shard plan for $REPOS_FILE: no changes"
            fi
          done

          if [ "$ALL_CLEAN" = false ]; then
            echo ""
            echo "❌ One or more shard plans have unexpected changes — review logs above"
            exit 1
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.ORG_GITHUB_TOKEN }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: true

      - name: Summary
        if: always()
        run: |
          echo "## State Migration: Push & Verify" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** \`${{ inputs.environment }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Source artifacts run ID:** \`${{ inputs.execute-run-id }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ job.status }}" = "success" ]; then
            echo "### ✅ Migration complete" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "All shard states pushed and verified with zero-change plans." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Post-migration steps" >> $GITHUB_STEP_SUMMARY
            echo "- The monolithic blob \`github.terraform.tfstate\` still exists in Azure — keep as fallback for a few days" >> $GITHUB_STEP_SUMMARY
            echo "- Remove \`environments/${{ inputs.environment }}/tfplan\` if it exists" >> $GITHUB_STEP_SUMMARY
            echo "- Switch CI to use \`terraform-sharded-ci.yml\` instead of \`terraform-ci.yml\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ Migration failed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "#### Recovery" >> $GITHUB_STEP_SUMMARY
            echo "The monolithic state blob \`github.terraform.tfstate\` is unchanged and can be used to restore." >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
            echo "# Re-initialise root config against the monolithic backend" >> $GITHUB_STEP_SUMMARY
            echo "./scripts/init.sh ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
            echo "terraform plan -var-file=environments/${{ inputs.environment }}/terraform.tfvars" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          fi
