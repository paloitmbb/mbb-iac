name: "Terraform State Pull"

# Pulls the remote Terraform state to a local artifact so it can be
# downloaded and used for offline operations such as state migration/sharding.
#
# Usage:
#   1. Run this workflow manually via workflow_dispatch.
#   2. Download the 'terraform-state-<environment>' artifact from the run.
#   3. Extract terraform.tfstate into the project root.
#   4. Run the migration script: ./migration-commands-dev.sh
#
# ⚠️  The downloaded state file is sensitive — do not commit it to Git.
#    It is automatically deleted from GitHub after the retention period.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to pull state from"
        required: true
        type: choice
        options:
          - dev
          - production

permissions:
  contents: read
  id-token: write  # Required for OIDC authentication with Azure

jobs:
  terraform-state-pull:
    name: 📥 Pull - Remote Terraform State
    runs-on: ubuntu-latest

    environment:
      name: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.5
          terraform_wrapper: false

      - name: Terraform Init
        run: |
          terraform init -backend-config=environments/${{ inputs.environment }}/backend.tfvars
        env:
          GITHUB_TOKEN: ${{ secrets.ORG_GITHUB_TOKEN }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_USE_OIDC: true

      - name: Pull Terraform State
        run: |
          echo "Pulling state from remote backend..."
          terraform state pull > terraform.tfstate

          # Validate the pulled state is not empty or malformed
          if [ ! -s terraform.tfstate ]; then
            echo "❌ Error: Pulled state file is empty"
            exit 1
          fi

          STATE_VERSION=$(python3 -c "import json,sys; d=json.load(open('terraform.tfstate')); print(d.get('version','unknown'))")
          STATE_SERIAL=$(python3 -c "import json,sys; d=json.load(open('terraform.tfstate')); print(d.get('serial','unknown'))")
          RESOURCE_COUNT=$(python3 -c "import json,sys; d=json.load(open('terraform.tfstate')); print(len(d.get('resources',[])))")

          echo ""
          echo "✅ State pulled successfully"
          echo "   Version : $STATE_VERSION"
          echo "   Serial  : $STATE_SERIAL"
          echo "   Resources: $RESOURCE_COUNT"
          echo ""
          echo "ℹ️  Download the artifact below and place terraform.tfstate"
          echo "   in the project root before running the migration script."
        env:
          GITHUB_TOKEN: ${{ secrets.ORG_GITHUB_TOKEN }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_USE_OIDC: true

      - name: Upload State as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-state-${{ inputs.environment }}
          path: terraform.tfstate
          # Retain for 1 day — state is sensitive, minimize exposure window
          retention-days: 1
          if-no-files-found: error
