name: "Team Management - Validate & Create PR"

on:
  repository_dispatch:
    types: [team-management-terraform]

permissions:
  issues: write
  pull-requests: write
  contents: write

jobs:
  validate-and-create-pr:
    name: Validate Request & Create PR
    runs-on: ubuntu-latest
    if: startsWith(github.event.client_payload.issue_title, '[team-management-terraform]')
    outputs:
      request-type: ${{ steps.parse.outputs.request-type }}
      team-name: ${{ steps.parse.outputs.team-name }}
      repository: ${{ steps.parse.outputs.repository }}
      permission: ${{ steps.parse.outputs.permission }}
      justification: ${{ steps.parse.outputs.justification }}
      validation-passed: ${{ steps.validate.outputs.validation-passed }}
      errors: ${{ steps.validate.outputs.errors }}
      validations: ${{ steps.validate.outputs.validations }}
      pr-number: ${{ steps.create-pr-gh.outputs.pr-number }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ORG_GITHUB_TOKEN }}

      - name: Parse issue form
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const issueBody = context.payload.client_payload.issue_body;

            function extractField(body, fieldLabel) {
              const regex = new RegExp(`### ${fieldLabel}\\s*\\n\\s*([^\\n#]+)`, 'i');
              const match = body.match(regex);
              return match ? match[1].trim() : '';
            }

            const requestType = extractField(issueBody, 'Request Type');
            const teamName = extractField(issueBody, 'Team');
            const repository = extractField(issueBody, 'Repository');
            const rawPermission = extractField(issueBody, 'Permission Level');
            const permission = (rawPermission && rawPermission !== '_No response_') ? rawPermission : 'pull';
            const justification = extractField(issueBody, 'Justification / Remark');

            core.setOutput('request-type', requestType);
            core.setOutput('team-name', teamName ? teamName.toLowerCase().replace(/\s+/g, '-') : '');
            core.setOutput('repository', repository ? repository.toLowerCase().replace(/\s+/g, '-') : '');
            core.setOutput('permission', permission);
            core.setOutput('justification', justification);

            console.log(`Request Type: ${requestType}`);
            console.log(`Team Name: ${teamName}`);
            console.log(`Repository: ${repository}`);
            console.log(`Permission: ${permission}`);

      - name: Validate team request
        id: validate
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ORG_GITHUB_TOKEN }}
          script: |
            const org = context.repo.owner;
            const requestType = '${{ steps.parse.outputs.request-type }}';
            const teamName = '${{ steps.parse.outputs.team-name }}';
            const repository = '${{ steps.parse.outputs.repository }}';
            const errors = [];
            const validations = [];

            // --- Common Validations ---

            // Validate request type
            const validTypes = [
              'Give team access to a repository',
              'Remove team access to a repository',
              'Create new team',
              'Delete team'
            ];
            if (!validTypes.includes(requestType)) {
              errors.push(`Invalid request type: "${requestType}". Must be one of: ${validTypes.join(', ')}`);
            } else {
              validations.push({ check: 'Request type is valid', result: '✅ Passed' });
            }

            // Validate team name
            if (!teamName) {
              errors.push('Team name is required');
            } else if (!/^[a-zA-Z0-9._-]+$/.test(teamName)) {
              errors.push('Team name must contain only alphanumeric characters, hyphens, underscores, and periods');
            } else {
              validations.push({ check: 'Team name format', result: '✅ Passed' });
            }

            // --- Team Existence Check (via GitHub API) ---
            let teamExists = false;
            try {
              await github.rest.teams.getByName({ org, team_slug: teamName });
              teamExists = true;
            } catch (e) {
              if (e.status !== 404) throw e;
            }

            // Validate based on request type
            if (requestType === 'Create new team') {
              if (teamExists) {
                errors.push(`Team "${teamName}" already exists. Cannot create a duplicate.`);
                validations.push({ check: 'Team does not exist (required for create)', result: '❌ Team already exists' });
              } else {
                validations.push({ check: 'Team does not exist (required for create)', result: '✅ Passed' });
              }
            } else if (['Give team access to a repository', 'Remove team access to a repository', 'Delete team'].includes(requestType)) {
              if (!teamExists) {
                errors.push(`Team "${teamName}" does not exist in the organization.`);
                validations.push({ check: 'Team exists', result: '❌ Not found' });
              } else {
                validations.push({ check: 'Team exists', result: '✅ Passed' });
              }
            }

            // --- Repository Validation (for repository access requests) ---
            const isAccessRequest = requestType.includes('access to a repository');
            if (isAccessRequest) {
              if (!repository || repository === '_No response_') {
                errors.push('Repository name is required for team access requests');
              } else {
                try {
                  await github.rest.repos.get({ owner: org, repo: repository });
                  validations.push({ check: `Repository "${repository}" exists`, result: '✅ Passed' });
                } catch (e) {
                  errors.push(`Repository "${repository}" does not exist in the organization`);
                  validations.push({ check: `Repository "${repository}" exists`, result: '❌ Not found' });
                }
              }
            }

            // --- Output Results ---
            const passed = errors.length === 0;
            core.setOutput('validation-passed', passed.toString());
            core.setOutput('errors', JSON.stringify(errors));
            core.setOutput('validations', JSON.stringify(validations));

            console.log(`Validation ${passed ? 'PASSED' : 'FAILED'} - ${errors.length} error(s)`);

            if (!passed) {
              core.setFailed(`Validation failed with ${errors.length} error(s): ${errors.join('; ')}`);
            }

      - name: Post validation summary to issue
        if: always()
        uses: actions/github-script@v7
        env:
          ERRORS_JSON: ${{ steps.validate.outputs.errors }}
          VALIDATIONS_JSON: ${{ steps.validate.outputs.validations }}
        with:
          github-token: ${{ secrets.ORG_GITHUB_TOKEN }}
          script: |
            const passed = '${{ steps.validate.outputs.validation-passed }}' === 'true';
            const errors = JSON.parse(process.env.ERRORS_JSON || '[]');
            const validations = JSON.parse(process.env.VALIDATIONS_JSON || '[]');

            const requestType = `${{ steps.parse.outputs.request-type }}`;
            const teamName = `${{ steps.parse.outputs.team-name }}`;
            const repository = `${{ steps.parse.outputs.repository }}`;
            const permission = `${{ steps.parse.outputs.permission }}`;

            let comment = passed
              ? '## ✅ Validation Passed\n\n'
              : '## ❌ Validation Failed\n\n';

            // Request summary table
            comment += '### 📋 Request Summary\n\n';
            comment += '| Field | Value |\n';
            comment += '|-------|-------|\n';
            comment += `| **Request Type** | ${requestType} |\n`;
            comment += `| **Team** | \`${teamName}\` |\n`;
            comment += `| **Repository** | ${repository || '_N/A_'} |\n`;
            comment += `| **Permission** | ${permission || '_N/A_'} |\n`;
            comment += `| **Requested By** | @${context.payload.client_payload.issue_user_login} |\n\n`;

            // Validation results
            comment += '### 🔍 Validation Results\n\n';
            comment += '| Check | Result |\n';
            comment += '|-------|--------|\n';
            for (const v of validations) {
              comment += `| ${v.check} | ${v.result} |\n`;
            }
            comment += '\n';

            // Errors (if any)
            if (errors.length > 0) {
              comment += '### ⚠️ Errors\n\n';
              for (const e of errors) {
                comment += `- ❌ ${e}\n`;
              }
              comment += '\n';
            }

            // Next steps
            if (passed) {
              comment += '### 📝 Next Steps\n\n';
              comment += '- ⏳ A pull request has been created with the changes\n';
              comment += '- Once approved and merged, changes will be applied automatically\n';
            } else {
              comment += '### 📝 Next Steps\n\n';
              comment += '- Please fix the validation errors and create a new request issue.\n';
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.client_payload.issue_number,
              body: comment,
            });

            // Add labels
            const labels = passed ? ['validation-passed'] : ['validation-failed'];
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.client_payload.issue_number,
              labels,
            });

            // Close issue if validation failed
            if (!passed) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.client_payload.issue_number,
                state: 'closed',
                state_reason: 'not_planned',
              });
            }

      - name: Install yq
        if: steps.validate.outputs.validation-passed == 'true'
        shell: bash
        run: |
          echo "::group::Install yq"
          if command -v yq &> /dev/null; then
            echo "✅ yq is already installed: $(yq --version)"
          else
            echo "📦 Installing yq..."
            sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
            sudo chmod +x /usr/local/bin/yq
            echo "✅ yq installed: $(yq --version)"
          fi
          echo "::endgroup::"

      - name: Update teams.yaml
        if: steps.validate.outputs.validation-passed == 'true'
        id: update-yaml
        shell: bash
        env:
          REQUEST_TYPE: ${{ steps.parse.outputs.request-type }}
          TEAM_NAME: ${{ steps.parse.outputs.team-name }}
          REPOSITORY: ${{ steps.parse.outputs.repository }}
          PERMISSION: ${{ steps.parse.outputs.permission }}
          REQUESTOR: ${{ github.event.client_payload.issue_user_login }}
          ISSUE_NUMBER: ${{ github.event.client_payload.issue_number }}
        run: |
          echo "::group::Update teams.yaml"
          TEAMS_FILE="data/teams.yaml"
          DEFAULTS_FILE="data/defaults.yaml"
          UPDATED=false

          # Load team defaults
          TEAM_PRIVACY=$(yq eval '.team_defaults.privacy' "$DEFAULTS_FILE")
          DEFAULT_PERMISSION=$(yq eval '.team_defaults.default_repository_permission' "$DEFAULTS_FILE")
          # Fall back to parsed permission if default not set, then to 'pull'
          EFFECTIVE_PERMISSION=${PERMISSION:-${DEFAULT_PERMISSION:-pull}}

          case "$REQUEST_TYPE" in
            "Create new team")
              export DESCRIPTION="Team created by @${REQUESTOR} via issue #${ISSUE_NUMBER}"
              export TEAM_PRIVACY
              yq -i '.teams = (.teams // []) + [{"name": strenv(TEAM_NAME), "description": strenv(DESCRIPTION), "privacy": strenv(TEAM_PRIVACY), "repositories": []}]' "$TEAMS_FILE"
              UPDATED=true
              echo "✅ Created new team entry: ${TEAM_NAME} (privacy: ${TEAM_PRIVACY})"
              ;;
            "Delete team")
              yq -i 'del(.teams[] | select(.name == strenv(TEAM_NAME)))' "$TEAMS_FILE"
              UPDATED=true
              echo "✅ Deleted team entry: ${TEAM_NAME}"
              ;;
            "Give team access to a repository")
              export EFFECTIVE_PERMISSION
              yq -i '(.teams[] | select(.name == strenv(TEAM_NAME)) | .repositories) = ((.teams[] | select(.name == strenv(TEAM_NAME)) | .repositories) // []) + [{"repository": strenv(REPOSITORY), "permission": strenv(EFFECTIVE_PERMISSION)}]' "$TEAMS_FILE"
              UPDATED=true
              echo "✅ Added ${REPOSITORY} (${EFFECTIVE_PERMISSION}) access to team ${TEAM_NAME}"
              ;;
            "Remove team access to a repository")
              yq -i 'del(.teams[] | select(.name == strenv(TEAM_NAME)) | .repositories[] | select(.repository == strenv(REPOSITORY)))' "$TEAMS_FILE"
              UPDATED=true
              echo "✅ Removed ${REPOSITORY} access from team ${TEAM_NAME}"
              ;;
            *)
              echo "⚠️ Unknown request type: ${REQUEST_TYPE}"
              ;;
          esac

          if [ "$UPDATED" = "true" ]; then
            if yq eval '.' "$TEAMS_FILE" > /dev/null 2>&1; then
              echo "✅ YAML syntax is valid"
              echo "yaml-updated=true" >> $GITHUB_OUTPUT
            else
              echo "❌ YAML syntax validation failed"
              echo "yaml-updated=false" >> $GITHUB_OUTPUT
              exit 1
            fi
          else
            echo "No changes made to teams.yaml"
            echo "yaml-updated=false" >> $GITHUB_OUTPUT
          fi
          echo "::endgroup::"

      - name: Create branch and PR
        if: steps.validate.outputs.validation-passed == 'true' && steps.update-yaml.outputs.yaml-updated == 'true'
        id: create-pr
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.ORG_GITHUB_TOKEN }}
          REQUEST_TYPE: ${{ steps.parse.outputs.request-type }}
          TEAM_NAME: ${{ steps.parse.outputs.team-name }}
          REPOSITORY: ${{ steps.parse.outputs.repository }}
          PERMISSION: ${{ steps.parse.outputs.permission }}
          REQUESTOR: ${{ github.event.client_payload.issue_user_login }}
          ISSUE_NUMBER: ${{ github.event.client_payload.issue_number }}
        run: |
          echo "::group::Create Branch and Commit"
          BRANCH_NAME="team-management/issue-${ISSUE_NUMBER}-${TEAM_NAME}"
          REQUEST_TYPE_LOWER=$(echo "$REQUEST_TYPE" | tr '[:upper:]' '[:lower:]')

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Delete remote branch if it exists (ignore errors)
          echo "Cleaning up existing remote branch (if any)..."
          git push origin --delete "${BRANCH_NAME}" 2>/dev/null || true

          # Create and checkout new branch
          git checkout -b "${BRANCH_NAME}"
          echo "✅ Created branch: ${BRANCH_NAME}"

          # Stage and commit
          git add data/teams.yaml
          COMMIT_MSG="chore(teams): ${REQUEST_TYPE_LOWER} for team \`${TEAM_NAME}\`"$'\n\n'"Related to issue #${ISSUE_NUMBER}"$'\n'"Requested by @${REQUESTOR}"
          git commit -m "$COMMIT_MSG"

          git push origin "${BRANCH_NAME}"
          echo "✅ Pushed to remote: ${BRANCH_NAME}"

          echo "branch-name=${BRANCH_NAME}" >> $GITHUB_OUTPUT
          echo "::endgroup::"

      - name: Create Pull Request
        if: steps.validate.outputs.validation-passed == 'true' && steps.update-yaml.outputs.yaml-updated == 'true'
        id: create-pr-gh
        uses: actions/github-script@v7
        env:
          REQUEST_TYPE: ${{ steps.parse.outputs.request-type }}
          TEAM_NAME: ${{ steps.parse.outputs.team-name }}
          REPOSITORY: ${{ steps.parse.outputs.repository }}
          PERMISSION: ${{ steps.parse.outputs.permission }}
          REQUESTOR: ${{ github.event.client_payload.issue_user_login }}
          ISSUE_NUMBER: ${{ github.event.client_payload.issue_number }}
          BRANCH_NAME: ${{ steps.create-pr.outputs.branch-name }}
        with:
          github-token: ${{ secrets.ORG_GITHUB_TOKEN }}
          script: |
            const requestType = process.env.REQUEST_TYPE;
            const teamName = process.env.TEAM_NAME;
            const repository = process.env.REPOSITORY;
            const permission = process.env.PERMISSION;
            const requestor = process.env.REQUESTOR;
            const issueNumber = process.env.ISSUE_NUMBER;
            const branchName = process.env.BRANCH_NAME;

            console.log('::group::Create Pull Request');

            const requestTypeLower = requestType.toLowerCase();
            const prTitle = `chore(teams): ${requestTypeLower} - ${teamName}`;

            let prBody = `## Team Management Request\n\n**Request Type:** ${requestType}\n**Team:** \`${teamName}\``;
            if (repository) prBody += `\n**Repository:** \`${repository}\``;
            if (permission && permission !== 'pull') prBody += `\n**Permission:** ${permission}`;
            prBody += `\n**Requested By:** @${requestor}\n**Issue:** #${issueNumber}`;

            const pr = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: prTitle,
              head: branchName,
              base: 'main',
              body: prBody
            });

            console.log(`✅ Pull request created: #${pr.data.number}`);
            console.log(`URL: ${pr.data.html_url}`);

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.data.number,
              labels: ['team-management', 'automated']
            });

            core.setOutput('pr-number', pr.data.number.toString());
            core.setOutput('pr-url', pr.data.html_url);
            console.log('::endgroup::');

      - name: Post PR creation summary to issue
        if: always() && steps.create-pr-gh.outputs.pr-number != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ORG_GITHUB_TOKEN }}
          script: |
            const prNumber = '${{ steps.create-pr-gh.outputs.pr-number }}';
            const prUrl = '${{ steps.create-pr-gh.outputs.pr-url }}';
            const requestType = `${{ steps.parse.outputs.request-type }}`;
            const teamName = `${{ steps.parse.outputs.team-name }}`;

            let comment = '## ✅ Pull Request Created\n\n';
            comment += '### 📋 Summary\n\n';
            comment += `A pull request has been created to apply the following change:\n\n`;
            comment += `- **Request Type:** ${requestType}\n`;
            comment += `- **Team:** \`${teamName}\`\n`;
            comment += `- **PR:** [#${prNumber}](${prUrl})\n\n`;
            comment += '### 📝 Next Steps\n\n';
            comment += `1. Review the changes in [PR #${prNumber}](${prUrl})\n`;
            comment += '2. Approve the PR if changes look correct\n';
            comment += '3. Merge the PR to apply changes automatically via Terraform\n';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.client_payload.issue_number,
              body: comment,
            });
