name: Terraform Sharded Apply - Infrastructure

# Runs on push to main when shard/global configs or data files change.
# Detects affected shards and applies them in parallel.
# Does NOT modify existing terraform-apply.yml — this is an additive workflow.

on:
  push:
    branches:
      - main
    paths:
      - "global/**"
      - "shards/**"
      - "data/repositories*.yaml"
      - "data/teams.yaml"
      - "modules/**/*.tf"
      - "environments/**/*.tfvars"

  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to apply"
        required: true
        type: choice
        options:
          - dev
          - production
      shard-ids:
        description: "Comma-separated shard IDs to apply (e.g., 001,002). Leave empty for auto-detect."
        required: false
        type: string
      apply-global:
        description: "Also apply the global state"
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  issues: write
  actions: write
  id-token: write

jobs:
  # =========================================================================
  # Job 1: Discover affected shards
  # =========================================================================
  discover:
    name: 🔍 Discover - Affected Shards
    runs-on: ubuntu-latest
    outputs:
      shard-ids: ${{ steps.detect.outputs.shard-ids }}
      global-changed: ${{ steps.detect.outputs.global-changed }}
      any-shards: ${{ steps.detect.outputs.any-shards }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect affected shards
        id: detect
        shell: bash
        run: |
          pip install pyyaml --quiet

          # Handle manual dispatch with explicit shard IDs
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.shard-ids }}" ]]; then
            # Parse comma-separated shard IDs into JSON array
            SHARD_JSON=$(echo '${{ inputs.shard-ids }}' | python3 -c "
          import sys, json
          ids = [s.strip() for s in sys.stdin.read().split(',') if s.strip()]
          print(json.dumps(ids))
          ")
            echo "shard-ids=$SHARD_JSON" >> $GITHUB_OUTPUT
            echo "global-changed=${{ inputs.apply-global }}" >> $GITHUB_OUTPUT
            echo "any-shards=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          python3 - << 'PYEOF'
          import yaml, re, json, subprocess, os, glob

          # Get changed files
          try:
              changed = subprocess.check_output(
                  ['git', 'diff', '--name-only', 'HEAD~1', 'HEAD'],
                  text=True
              ).strip().split('\n')
          except subprocess.CalledProcessError:
              changed = []

          print(f"Changed files: {changed}")

          global_patterns = ['global/', 'modules/', 'environments/']
          global_changed = any(
              any(f.startswith(p) for p in global_patterns)
              for f in changed
          )
          modules_changed = any(f.startswith('modules/') for f in changed)

          # Build shard mapping from ALL YAML files
          data_dir = 'data'
          files = sorted(glob.glob(os.path.join(data_dir, 'repositories*.yaml')))
          all_shards = set()
          for fpath in files:
              with open(fpath) as f:
                  data = yaml.safe_load(f) or {}
              for repo in data.get('repositories', []):
                  for t in repo.get('topics', []):
                      m = re.match(r'^state-group-(\d{3})$', t)
                      if m:
                          all_shards.add(m.group(1))

          # If modules or shard config changed → all shards
          if modules_changed or any(f.startswith('shards/') for f in changed):
              affected = sorted(all_shards)
          else:
              # Data changed → all shards with repos (conservative approach)
              data_changed = any(f.startswith('data/') for f in changed)
              affected = sorted(all_shards) if data_changed else []

          with open(os.environ['GITHUB_OUTPUT'], 'a') as out:
              out.write(f'shard-ids={json.dumps(affected)}\n')
              out.write(f'global-changed={"true" if global_changed else "false"}\n')
              out.write(f'any-shards={"true" if affected else "false"}\n')
          PYEOF

  # =========================================================================
  # Job 2: Validate state-group topics
  # =========================================================================
  validate:
    name: ✅ Validate - State Groups
    runs-on: ubuntu-latest
    needs: discover
    steps:
      - uses: actions/checkout@v4

      - name: Validate state-group topics
        run: |
          pip install pyyaml --quiet
          bash scripts/validate-state-groups.sh

  # =========================================================================
  # Job 3: Apply global state
  # =========================================================================
  apply-global:
    name: 🚀 Apply - Global State
    needs: [discover, validate]
    if: needs.discover.outputs.global-changed == 'true'
    runs-on: ubuntu-latest

    concurrency:
      group: terraform-global-apply
      cancel-in-progress: false

    environment:
      name: ${{ inputs.environment || 'dev' }}

    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ vars.TERRAFORM_VERSION || '1.14.5' }}
          terraform_wrapper: false

      - name: Terraform Init (global)
        working-directory: global
        run: |
          terraform init \
            -backend-config="../environments/${{ inputs.environment || 'dev' }}/backend.tfvars" \
            -backend-config="key=github-global.terraform.tfstate"
        env:
          GITHUB_TOKEN: ${{ secrets.ORG_GITHUB_TOKEN }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_USE_OIDC: true

      - name: Terraform Plan (global)
        working-directory: global
        run: |
          terraform plan \
            -var-file="../environments/${{ inputs.environment || 'dev' }}/terraform.tfvars" \
            -out=global-tfplan
        env:
          GITHUB_TOKEN: ${{ secrets.ORG_GITHUB_TOKEN }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_USE_OIDC: true

      - name: Terraform Apply (global)
        working-directory: global
        run: terraform apply -auto-approve global-tfplan
        env:
          GITHUB_TOKEN: ${{ secrets.ORG_GITHUB_TOKEN }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_USE_OIDC: true

  # =========================================================================
  # Job 4: Apply each affected shard in parallel
  # =========================================================================
  apply-shard:
    name: 🚀 Apply - Shard ${{ matrix.shard_id }}
    needs: [discover, validate, apply-global]
    # Run even if apply-global was skipped (not needed), but not if it failed
    if: |
      always() &&
      needs.validate.result == 'success' &&
      (needs.apply-global.result == 'success' || needs.apply-global.result == 'skipped') &&
      needs.discover.outputs.any-shards == 'true'
    runs-on: ubuntu-latest

    concurrency:
      group: terraform-shard-${{ matrix.shard_id }}-apply
      cancel-in-progress: false

    strategy:
      matrix:
        shard_id: ${{ fromJSON(needs.discover.outputs.shard-ids) }}
      max-parallel: 10
      fail-fast: false

    environment:
      name: ${{ inputs.environment || 'dev' }}

    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ vars.TERRAFORM_VERSION || '1.14.5' }}
          terraform_wrapper: false

      - name: Extract org name
        id: org
        run: |
          ORG_NAME=$(grep -oP 'name\s*=\s*"\K[^"]+' "environments/${{ inputs.environment || 'dev' }}/terraform.tfvars" | head -1)
          echo "name=$ORG_NAME" >> $GITHUB_OUTPUT

      - name: Terraform Init (shard ${{ matrix.shard_id }})
        working-directory: shards
        run: |
          terraform init \
            -backend-config="../environments/${{ inputs.environment || 'dev' }}/backend.tfvars" \
            -backend-config="key=github-shard-${{ matrix.shard_id }}.terraform.tfstate"
        env:
          GITHUB_TOKEN: ${{ secrets.ORG_GITHUB_TOKEN }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_USE_OIDC: true

      - name: Terraform Plan (shard ${{ matrix.shard_id }})
        working-directory: shards
        run: |
          terraform plan \
            -var="shard_id=${{ matrix.shard_id }}" \
            -var="organization_name=${{ steps.org.outputs.name }}" \
            -out=shard-${{ matrix.shard_id }}-tfplan
        env:
          GITHUB_TOKEN: ${{ secrets.ORG_GITHUB_TOKEN }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_USE_OIDC: true

      - name: Terraform Apply (shard ${{ matrix.shard_id }})
        working-directory: shards
        run: terraform apply -auto-approve shard-${{ matrix.shard_id }}-tfplan
        env:
          GITHUB_TOKEN: ${{ secrets.ORG_GITHUB_TOKEN }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_USE_OIDC: true
