name: Terraform Sharded Apply - Infrastructure

# Runs on push to main when shard/global configs or data files change.
# Detects which repository YAML files are affected and applies them in parallel.
# Each data/repositories*.yaml file maps to its own Terraform state.
# A new YAML file automatically generates a new state on first apply.

on:
  push:
    branches:
      - main
    paths:
      - "global/**"
      - "shards/**"
      - "data/repositories*.yaml"
      - "data/teams.yaml"
      - "modules/**/*.tf"
      - "environments/**/*.tfvars"

  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to apply"
        required: true
        type: choice
        options:
          - dev
          - production
      repo-files:
        description: "Comma-separated YAML filenames to apply (e.g., repositories.yaml,repositories-002.yaml). Leave empty for auto-detect."
        required: false
        type: string
      apply-global:
        description: "Also apply the global state"
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  issues: write
  actions: write
  id-token: write

jobs:
  # =========================================================================
  # Job 1: Discover affected YAML files (shards)
  # =========================================================================
  discover:
    name: 🔍 Discover - Affected Shards
    runs-on: ubuntu-latest
    outputs:
      repo-files: ${{ steps.detect.outputs.repo-files }}
      global-changed: ${{ steps.detect.outputs.global-changed }}
      any-shards: ${{ steps.detect.outputs.any-shards }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect affected YAML files
        id: detect
        shell: bash
        env:
          APPLY_GLOBAL_INPUT: ${{ inputs.apply-global || 'true' }}
        run: |
          pip install pyyaml --quiet

          # Handle manual dispatch with explicit file list (overrides auto-detect)
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.repo-files }}" ]]; then
            FILES_JSON=$(echo '${{ inputs.repo-files }}' | python3 -c "
          import sys, json
          ids = [s.strip() for s in sys.stdin.read().split(',') if s.strip()]
          print(json.dumps(ids))
          ")
            echo "repo-files=$FILES_JSON" >> $GITHUB_OUTPUT
            echo "global-changed=${{ inputs.apply-global }}" >> $GITHUB_OUTPUT
            echo "any-shards=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          # workflow_dispatch with empty repo-files falls through to Python which
          # handles it by applying ALL shards (see APPLY_GLOBAL_INPUT env var below).

          python3 - << 'PYEOF'
          import json, subprocess, os, glob

          event_name = os.environ.get('GITHUB_EVENT_NAME', 'push')

          # Discover all repository YAML files present on disk
          all_repo_files = sorted([
              os.path.basename(f)
              for f in glob.glob('data/repositories*.yaml')
          ])

          # Bug fix: on workflow_dispatch with no explicit repo-files, apply ALL shards
          # and respect the apply-global input rather than using git diff (which only
          # reflects the last commit and would silently skip everything).
          if event_name == 'workflow_dispatch':
              apply_global_input = os.environ.get('APPLY_GLOBAL_INPUT', 'true')
              with open(os.environ['GITHUB_OUTPUT'], 'a') as out:
                  out.write(f'repo-files={json.dumps(all_repo_files)}\n')
                  out.write(f'global-changed={apply_global_input}\n')
                  out.write(f'any-shards={"true" if all_repo_files else "false"}\n')
              exit(0)

          # Get changed files (push path)
          try:
              changed = subprocess.check_output(
                  ['git', 'diff', '--name-only', 'HEAD~1', 'HEAD'],
                  text=True
              ).strip().split('\n')
          except subprocess.CalledProcessError:
              changed = []

          print(f"Changed files: {changed}")

          global_patterns = ['global/', 'modules/', 'environments/']
          global_changed = any(
              any(f.startswith(p) for p in global_patterns)
              for f in changed
          )
          modules_changed = any(f.startswith('modules/') for f in changed)
          shards_changed = any(f.startswith('shards/') for f in changed)

          # If modules or shard config changed → all files
          if modules_changed or shards_changed:
              affected = all_repo_files
          else:
              # Only the directly changed YAML files.
              # Use the git diff list, not shell glob, so newly created YAML files
              # that don't exist on disk yet are still detected.
              affected = sorted([
                  os.path.basename(f) for f in changed
                  if f.startswith('data/repositories') and f.endswith('.yaml')
              ])
              # If teams.yaml changed → all files (team-repo bindings)
              if any(f == 'data/teams.yaml' for f in changed):
                  affected = all_repo_files

          with open(os.environ['GITHUB_OUTPUT'], 'a') as out:
              out.write(f'repo-files={json.dumps(affected)}\n')
              out.write(f'global-changed={"true" if global_changed else "false"}\n')
              out.write(f'any-shards={"true" if affected else "false"}\n')
          PYEOF

  # =========================================================================
  # Job 2: Apply global state
  # =========================================================================
  apply-global:
    name: 🚀 Apply - Global State
    needs: discover
    if: needs.discover.outputs.global-changed == 'true'
    runs-on: ubuntu-latest

    concurrency:
      group: terraform-global-apply
      cancel-in-progress: false

    environment:
      name: ${{ inputs.environment || 'dev' }}

    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ vars.TERRAFORM_VERSION || '1.14.5' }}
          terraform_wrapper: false

      - name: Terraform Init (global)
        working-directory: global
        run: |
          terraform init \
            -backend-config="../environments/${{ inputs.environment || 'dev' }}/backend.tfvars" \
            -backend-config="key=github-global.terraform.tfstate"
        env:
          GITHUB_TOKEN: ${{ secrets.ORG_GITHUB_TOKEN }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_USE_OIDC: true

      - name: Terraform Plan (global)
        working-directory: global
        run: |
          terraform plan \
            -var-file="../environments/${{ inputs.environment || 'dev' }}/terraform.tfvars" \
            -out=global-tfplan
        env:
          GITHUB_TOKEN: ${{ secrets.ORG_GITHUB_TOKEN }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_USE_OIDC: true

      - name: Terraform Apply (global)
        working-directory: global
        run: terraform apply -auto-approve global-tfplan
        env:
          GITHUB_TOKEN: ${{ secrets.ORG_GITHUB_TOKEN }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_USE_OIDC: true

  # =========================================================================
  # Job 3: Apply each affected shard (YAML file) in parallel
  # =========================================================================
  apply-shard:
    name: 🚀 Apply - ${{ matrix.repo_file }}
    needs: [discover, apply-global]
    # Run even if apply-global was skipped (not needed), but not if it failed
    if: |
      always() &&
      (needs.apply-global.result == 'success' || needs.apply-global.result == 'skipped') &&
      needs.discover.outputs.any-shards == 'true'
    runs-on: ubuntu-latest

    concurrency:
      group: terraform-shard-${{ matrix.repo_file }}-apply
      cancel-in-progress: false

    strategy:
      matrix:
        repo_file: ${{ fromJSON(needs.discover.outputs.repo-files) }}
      max-parallel: 10
      fail-fast: false

    environment:
      name: ${{ inputs.environment || 'dev' }}

    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ vars.TERRAFORM_VERSION || '1.14.5' }}
          terraform_wrapper: false

      - name: Extract org name
        id: org
        run: |
          ORG_NAME=$(grep -oP 'name\s*=\s*"\K[^"]+' "environments/${{ inputs.environment || 'dev' }}/terraform.tfvars" | head -1)
          echo "name=$ORG_NAME" >> $GITHUB_OUTPUT

      - name: Derive state key
        id: state
        run: |
          STATE_KEY_BASE=$(echo "${{ matrix.repo_file }}" | sed 's/\.yaml$//')
          echo "key=github-repos-${STATE_KEY_BASE}.terraform.tfstate" >> $GITHUB_OUTPUT

      - name: Terraform Init (${{ matrix.repo_file }})
        working-directory: shards
        run: |
          terraform init \
            -backend-config="../environments/${{ inputs.environment || 'dev' }}/backend.tfvars" \
            -backend-config="key=${{ steps.state.outputs.key }}"
        env:
          GITHUB_TOKEN: ${{ secrets.ORG_GITHUB_TOKEN }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_USE_OIDC: true

      - name: Clean up security state for archived repos
        working-directory: shards
        run: |
          # When a repo transitions to archived: true, its github_security module instance
          # is removed from for_each. Terraform would plan a DESTROY → DELETE call on
          # github_repository_dependabot_security_updates, which the GitHub API rejects
          # with 422 when an org-enforced security configuration is active.
          # Removing the module from state before plan prevents any API call being made.
          echo "🔍 Checking for orphaned security module instances in ${{ matrix.repo_file }}..."
          STATE_LIST=$(terraform state list 2>/dev/null || echo "")
          CLEANED=0
          SEEN_KEYS=""

          # Write archive-check helper to a temp file so the Python code
          # is properly indented within the YAML block scalar.
          cat > /tmp/check_archived.py << 'PYEOF'
          import yaml, sys, glob
          for fpath in sorted(glob.glob('../data/repositories*.yaml')):
              with open(fpath) as f:
                  data = yaml.safe_load(f) or {}
              for repo in data.get('repositories', []):
                  if repo['name'] == sys.argv[1] and repo.get('archived', False):
                      print('true')
                      sys.exit(0)
          print('false')
          PYEOF

          for item in $STATE_LIST; do
            repo_key=$(echo "$item" | sed -n 's/^module\.github_security\["\([^"]*\)"\].*/\1/p')
            [ -z "$repo_key" ] && continue

            # Deduplicate — multiple resources share the same module instance key
            if echo "$SEEN_KEYS" | grep -qF "|${repo_key}|" 2>/dev/null; then
              continue
            fi
            SEEN_KEYS="${SEEN_KEYS}|${repo_key}|"

            is_archived=$(python3 /tmp/check_archived.py "$repo_key" 2>/dev/null || echo "false")

            if [ "$is_archived" = "true" ]; then
              echo "🗑️  Removing security state for archived repo: $repo_key"
              terraform state rm "module.github_security[\"$repo_key\"]" || true
              CLEANED=$((CLEANED + 1))
            fi
          done

          if [ "$CLEANED" -gt 0 ]; then
            echo "✅ Cleaned $CLEANED orphaned security module instance(s)"
          else
            echo "✅ No orphaned security state found"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.ORG_GITHUB_TOKEN }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_USE_OIDC: true

      - name: Terraform Plan (${{ matrix.repo_file }})
        working-directory: shards
        run: |
          terraform plan \
            -var="repositories_file=${{ matrix.repo_file }}" \
            -var="organization_name=${{ steps.org.outputs.name }}" \
            -out=shard-tfplan
        env:
          GITHUB_TOKEN: ${{ secrets.ORG_GITHUB_TOKEN }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_USE_OIDC: true

      - name: Terraform Apply (${{ matrix.repo_file }})
        working-directory: shards
        run: terraform apply -auto-approve shard-tfplan
        env:
          GITHUB_TOKEN: ${{ secrets.ORG_GITHUB_TOKEN }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_USE_OIDC: true

  # =========================================================================
  # Job 4: Detect newly added repos across all shard YAML files
  # =========================================================================
  check-repos-yaml:
    name: 🔍 Check - repositories YAML changed
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    outputs:
      repos-added: ${{ steps.check.outputs.repos-added }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - id: check
        run: |
          # Use git diff pathspec (not shell glob) so newly created shard YAML files
          # that didn't exist in the previous commit are also detected.
          if git diff --name-only HEAD~1 HEAD | grep -q 'data/repositories.*\.yaml'; then
            if git diff HEAD~1 HEAD -- 'data/repositories*.yaml' | grep -q '^+.*- name:'; then
              echo "repos-added=true" >> $GITHUB_OUTPUT
            else
              echo "repos-added=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "repos-added=false" >> $GITHUB_OUTPUT
          fi

  # =========================================================================
  # Job 5: Seed newly created repositories with tech-stack template
  # Runs once after ALL shard applies succeed.
  # Detects repos added across any data/repositories*.yaml in this push,
  # maps their topics to a stack folder in paloitmbb/mbb-repo-templates/stacks/,
  # and pushes that folder's content as the initial commit to the new repo.
  # =========================================================================
  seed-repository-template:
    name: 🌱 Seed - Bootstrap Repository Template
    runs-on: ubuntu-latest
    needs: [apply-shard, check-repos-yaml]
    if: >
      always() &&
      needs.apply-shard.result == 'success' &&
      needs.check-repos-yaml.outputs.repos-added == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect newly added repositories and resolve tech stacks
        id: detect
        shell: bash
        run: |
          pip install pyyaml --quiet

          python3 - << 'PYEOF'
          import subprocess, yaml, json, os, glob

          # Find repo names added in this commit across all YAML shard files
          diff = subprocess.check_output(
              ['git', 'diff', 'HEAD~1', 'HEAD', '--'] +
              sorted(glob.glob('data/repositories*.yaml')),
              text=True
          )

          added_names = set()
          for line in diff.splitlines():
              if line.startswith('+') and '- name:' in line:
                  name = line.split('- name:')[1].strip()
                  added_names.add(name)

          if not added_names:
              print('\u2139\ufe0f  No new repositories detected in this commit')
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write('has-new-repos=false\n')
                  f.write('repos-json=[]\n')
              exit(0)

          print(f'Newly added repos: {sorted(added_names)}')

          all_repos = []
          for fpath in sorted(glob.glob('data/repositories*.yaml')):
              with open(fpath) as f:
                  data = yaml.safe_load(f) or {}
              all_repos.extend(data.get('repositories', []))

          KNOWN_STACKS = ['python', 'react', 'nodejs', 'java-springboot']

          result = []
          for repo in all_repos:
              if repo['name'] not in added_names:
                  continue
              topics = repo.get('topics', [])
              stack = next((t for t in topics if t in KNOWN_STACKS), None)
              if stack:
                  result.append({
                      'name': repo['name'],
                      'stack': stack,
                      'default_branch': repo.get('default_branch', 'main'),
                  })
                  print(f"  \u2192 {repo['name']} : stack={stack}")
              else:
                  print(f"  \u26a0\ufe0f  {repo['name']}: no known stack in topics {topics} \u2014 skipping seed")

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'has-new-repos={"true" if result else "false"}\n')
              f.write(f'repos-json={json.dumps(result)}\n')
          PYEOF

      - name: Clone template repository
        if: steps.detect.outputs.has-new-repos == 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/mbb-repo-templates
          token: ${{ secrets.ORG_GITHUB_TOKEN }}
          path: mbb-repo-templates

      - name: Push template stack to each new repository
        if: steps.detect.outputs.has-new-repos == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.ORG_GITHUB_TOKEN }}
          ORG: ${{ github.repository_owner }}
          REPOS_JSON: ${{ steps.detect.outputs.repos-json }}
        run: |
          echo "$REPOS_JSON" | jq -c '.[]' | while read -r repo; do
            NAME=$(echo "$repo" | jq -r '.name')
            STACK=$(echo "$repo" | jq -r '.stack')
            BRANCH=$(echo "$repo" | jq -r '.default_branch')
            STACK_PATH="mbb-repo-templates/stacks/$STACK"

            if [[ ! -d "$STACK_PATH" ]]; then
              echo "⚠️  Stack folder '$STACK_PATH' not found in mbb-repo-templates — skipping $NAME"
              echo "  Available stacks: $(ls mbb-repo-templates/stacks/ 2>/dev/null | tr '\n' ' ')"
              continue
            fi

            SEED_DIR="seed-$NAME"
            cp -r "$STACK_PATH" "$SEED_DIR"

            (
              cd "$SEED_DIR"
              git init
              git config user.name  "github-actions[bot]"
              git config user.email "github-actions[bot]@users.noreply.github.com"
              git add -A
              git commit -m "feat: 🌱 bootstrap repository from ${STACK} template"
              git branch -M "$BRANCH"
              git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${ORG}/${NAME}.git"
              git push -u origin "$BRANCH"
            ) && echo "✅ Seeded $NAME with $STACK template" \
              || echo "❌ Failed to seed $NAME — check logs above"
          done
