name: Terraform Sharded Apply - Infrastructure

# Runs on push to main when shard/global configs or data files change.
# Detects which repository YAML files are affected and applies them in parallel.
# Each data/repositories*.yaml file maps to its own Terraform state.
# A new YAML file automatically generates a new state on first apply.

on:
  push:
    branches:
      - main
    paths:
      - "global/**"
      - "shards/**"
      - "data/repositories*.yaml"
      - "data/teams.yaml"
      - "modules/**/*.tf"
      - "environments/**/*.tfvars"

  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to apply"
        required: true
        type: choice
        options:
          - dev
          - production
      repo-files:
        description: "Comma-separated YAML filenames to apply (e.g., repositories.yaml,repositories-002.yaml). Leave empty for auto-detect."
        required: false
        type: string
      apply-global:
        description: "Also apply the global state"
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  issues: write
  actions: write
  id-token: write

jobs:
  # =========================================================================
  # Job 1: Discover affected YAML files (shards)
  # =========================================================================
  discover:
    name: 🔍 Discover - Affected Shards
    runs-on: ubuntu-latest
    outputs:
      repo-files: ${{ steps.detect.outputs.repo-files }}
      global-changed: ${{ steps.detect.outputs.global-changed }}
      any-shards: ${{ steps.detect.outputs.any-shards }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect affected YAML files
        id: detect
        shell: bash
        run: |
          pip install pyyaml --quiet

          # Handle manual dispatch with explicit file list
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.repo-files }}" ]]; then
            FILES_JSON=$(echo '${{ inputs.repo-files }}' | python3 -c "
          import sys, json
          ids = [s.strip() for s in sys.stdin.read().split(',') if s.strip()]
          print(json.dumps(ids))
          ")
            echo "repo-files=$FILES_JSON" >> $GITHUB_OUTPUT
            echo "global-changed=${{ inputs.apply-global }}" >> $GITHUB_OUTPUT
            echo "any-shards=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          python3 - << 'PYEOF'
          import json, subprocess, os, glob

          # Get changed files
          try:
              changed = subprocess.check_output(
                  ['git', 'diff', '--name-only', 'HEAD~1', 'HEAD'],
                  text=True
              ).strip().split('\n')
          except subprocess.CalledProcessError:
              changed = []

          print(f"Changed files: {changed}")

          global_patterns = ['global/', 'modules/', 'environments/']
          global_changed = any(
              any(f.startswith(p) for p in global_patterns)
              for f in changed
          )
          modules_changed = any(f.startswith('modules/') for f in changed)
          shards_changed = any(f.startswith('shards/') for f in changed)

          # Discover all repository YAML files
          all_repo_files = sorted([
              os.path.basename(f)
              for f in glob.glob('data/repositories*.yaml')
          ])

          # If modules or shard config changed → all files
          if modules_changed or shards_changed:
              affected = all_repo_files
          else:
              # Only the directly changed YAML files
              affected = sorted([
                  os.path.basename(f) for f in changed
                  if f.startswith('data/repositories') and f.endswith('.yaml')
              ])
              # If teams.yaml changed → all files (team-repo bindings)
              if any(f == 'data/teams.yaml' for f in changed):
                  affected = all_repo_files

          with open(os.environ['GITHUB_OUTPUT'], 'a') as out:
              out.write(f'repo-files={json.dumps(affected)}\n')
              out.write(f'global-changed={"true" if global_changed else "false"}\n')
              out.write(f'any-shards={"true" if affected else "false"}\n')
          PYEOF

  # =========================================================================
  # Job 2: Apply global state
  # =========================================================================
  apply-global:
    name: 🚀 Apply - Global State
    needs: discover
    if: needs.discover.outputs.global-changed == 'true'
    runs-on: ubuntu-latest

    concurrency:
      group: terraform-global-apply
      cancel-in-progress: false

    environment:
      name: ${{ inputs.environment || 'dev' }}

    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ vars.TERRAFORM_VERSION || '1.14.5' }}
          terraform_wrapper: false

      - name: Terraform Init (global)
        working-directory: global
        run: |
          terraform init \
            -backend-config="../environments/${{ inputs.environment || 'dev' }}/backend.tfvars" \
            -backend-config="key=github-global.terraform.tfstate"
        env:
          GITHUB_TOKEN: ${{ secrets.ORG_GITHUB_TOKEN }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_USE_OIDC: true

      - name: Terraform Plan (global)
        working-directory: global
        run: |
          terraform plan \
            -var-file="../environments/${{ inputs.environment || 'dev' }}/terraform.tfvars" \
            -out=global-tfplan
        env:
          GITHUB_TOKEN: ${{ secrets.ORG_GITHUB_TOKEN }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_USE_OIDC: true

      - name: Terraform Apply (global)
        working-directory: global
        run: terraform apply -auto-approve global-tfplan
        env:
          GITHUB_TOKEN: ${{ secrets.ORG_GITHUB_TOKEN }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_USE_OIDC: true

  # =========================================================================
  # Job 3: Apply each affected shard (YAML file) in parallel
  # =========================================================================
  apply-shard:
    name: 🚀 Apply - ${{ matrix.repo_file }}
    needs: [discover, apply-global]
    # Run even if apply-global was skipped (not needed), but not if it failed
    if: |
      always() &&
      (needs.apply-global.result == 'success' || needs.apply-global.result == 'skipped') &&
      needs.discover.outputs.any-shards == 'true'
    runs-on: ubuntu-latest

    concurrency:
      group: terraform-shard-${{ matrix.repo_file }}-apply
      cancel-in-progress: false

    strategy:
      matrix:
        repo_file: ${{ fromJSON(needs.discover.outputs.repo-files) }}
      max-parallel: 10
      fail-fast: false

    environment:
      name: ${{ inputs.environment || 'dev' }}

    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ vars.TERRAFORM_VERSION || '1.14.5' }}
          terraform_wrapper: false

      - name: Extract org name
        id: org
        run: |
          ORG_NAME=$(grep -oP 'name\s*=\s*"\K[^"]+' "environments/${{ inputs.environment || 'dev' }}/terraform.tfvars" | head -1)
          echo "name=$ORG_NAME" >> $GITHUB_OUTPUT

      - name: Derive state key
        id: state
        run: |
          STATE_KEY_BASE=$(echo "${{ matrix.repo_file }}" | sed 's/\.yaml$//')
          echo "key=github-repos-${STATE_KEY_BASE}.terraform.tfstate" >> $GITHUB_OUTPUT

      - name: Terraform Init (${{ matrix.repo_file }})
        working-directory: shards
        run: |
          terraform init \
            -backend-config="../environments/${{ inputs.environment || 'dev' }}/backend.tfvars" \
            -backend-config="key=${{ steps.state.outputs.key }}"
        env:
          GITHUB_TOKEN: ${{ secrets.ORG_GITHUB_TOKEN }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_USE_OIDC: true

      - name: Terraform Plan (${{ matrix.repo_file }})
        working-directory: shards
        run: |
          terraform plan \
            -var="repositories_file=${{ matrix.repo_file }}" \
            -var="organization_name=${{ steps.org.outputs.name }}" \
            -out=shard-tfplan
        env:
          GITHUB_TOKEN: ${{ secrets.ORG_GITHUB_TOKEN }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_USE_OIDC: true

      - name: Terraform Apply (${{ matrix.repo_file }})
        working-directory: shards
        run: terraform apply -auto-approve shard-tfplan
        env:
          GITHUB_TOKEN: ${{ secrets.ORG_GITHUB_TOKEN }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_USE_OIDC: true
